<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Aura Clinic · 智能报价与护理方案</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f0; font-family: 'Inter', sans-serif; padding: 1rem; }
        
        /* 密码锁屏层 */
        .lock-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #2c2a28e6;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: all 0.3s;
        }
        .lock-card {
            background: white;
            border-radius: 40px;
            padding: 2rem 1.8rem;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }
        .lock-card h2 { font-family: 'Playfair Display', serif; color: #5e4e3c; margin-bottom: 0.5rem; }
        .lock-card p { font-size: 0.8rem; color: #8f7a66; margin-bottom: 1.2rem; }
        .lock-card input { width: 100%; padding: 12px 16px; margin: 0.5rem 0; border: 1px solid #ddd6ce; border-radius: 60px; font-size: 1rem; outline: none; }
        .lock-card button { background: #c6ad93; color: white; border: none; padding: 10px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 0.5rem; }
        .error-msg { color: #c75c3c; font-size: 0.7rem; margin-top: 0.5rem; }
        
        .main-app { display: none; max-width: 1400px; margin: 0 auto; }
        .app-header { background: white; border-radius: 32px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid #e9dfd6; }
        .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5e4e3c; }
        .logo p { font-size: 0.65rem; color: #b7a99a; }
        .auth-buttons { display: flex; gap: 12px; }
        .btn { padding: 6px 16px; border-radius: 60px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border: 1px solid #d6c6b8; background: transparent; transition: 0.2s; }
        .btn-primary { background: #c6ad93; color: white; border: none; }
        .btn-outline { border: 1px solid #c6ad93; color: #c6ad93; }
        .admin-badge { background: #e9dfd4; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
        
        /* 双栏核心区 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        .card { background: white; border-radius: 28px; border: 1px solid #e9dfd6; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
        .card-header { background: #fefaf5; padding: 0.8rem 1.2rem; border-bottom: 1px solid #f0e5db; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .card-header h3 { font-size: 1rem; font-weight: 600; color: #8b7764; }
        .library-grid { max-height: 380px; overflow-y: auto; padding: 0.8rem; display: flex; flex-direction: column; gap: 8px; }
        .lib-item { background: #fefcf9; border-radius: 18px; padding: 0.6rem 0.8rem; border: 1px solid #eee3d9; display: flex; justify-content: space-between; align-items: center; }
        .lib-info .name { font-weight: 600; font-size: 0.85rem; }
        .lib-info .price { font-size: 0.7rem; color: #b99f87; }
        .lib-actions { display: flex; gap: 8px; align-items: center; }
        .edit-btn, .delete-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 0 4px; }
        .add-to-quote { background: #e9dfd4; border: none; padding: 4px 12px; border-radius: 40px; font-size: 0.65rem; cursor: pointer; }
        
        /* 报价区 */
        .quote-section { margin-bottom: 1.5rem; }
        .quote-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; }
        .package-bar { background: #f9f4ed; border-radius: 20px; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .package-select { padding: 6px 12px; border-radius: 40px; border: 1px solid #ddd0c2; background: white; }
        .quote-items-container { background: #fefcf9; border-radius: 28px; border: 1px solid #e9dfd6; padding: 1rem; min-height: 280px; }
        .quote-item { background: white; border-radius: 18px; padding: 0.7rem; margin-bottom: 0.6rem; border: 1px solid #eee3d9; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; }
        .item-details { flex: 2; min-width: 140px; }
        .item-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .qty-input, .discount-input { width: 55px; padding: 4px; border-radius: 20px; border: 1px solid #ddd0c2; text-align: center; }
        .remove-item { background: none; border: none; cursor: pointer; color: #b7a99a; font-size: 1.1rem; }
        .total-bar { background: #f2e9e0; border-radius: 28px; padding: 1rem 1.2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
        .total-amount { font-size: 1.8rem; font-weight: 700; color: #5e4e3c; }
        
        /* 报价单模态窗 */
        .quote-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .quote-modal.show { display: flex; }
        .quote-modal-content { background: white; border-radius: 32px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 1.8rem; }
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        .footer-note { text-align: center; font-size: 0.6rem; color: #ccbeaf; margin-top: 1rem; padding-top: 0.8rem; }
    </style>
</head>
<body>

<!-- 密码锁屏 -->
<div id="lockScreen" class="lock-screen">
    <div class="lock-card">
        <h2>🔐 员工通道</h2>
        <p>请输入开页密码进入系统</p>
        <input type="password" id="pagePasswordInput" placeholder="开页密码" autocomplete="off">
        <button id="unlockPageBtn">进入工作台</button>
        <div id="lockError" class="error-msg"></div>
    </div>
</div>

<!-- 主应用 -->
<div id="mainApp" class="main-app">
    <div class="app-header">
        <div class="logo"><h1>✦ AURA CLINIC ✦</h1><p>智能报价 · 护理方案 · 内部专用</p></div>
        <div class="auth-buttons">
            <span id="adminStatusBadge" class="admin-badge" style="display:none;">👑 管理员模式</span>
            <button id="adminLoginBtn" class="btn btn-outline">🔑 管理员登入</button>
            <button id="logoutAdminBtn" class="btn" style="display:none;">退出管理</button>
        </div>
    </div>

    <!-- 双栏：服务库 + 产品库 -->
    <div class="dashboard">
        <!-- 服务库 -->
        <div class="card">
            <div class="card-header"><h3>💆 疗程服务</h3><button id="addServiceBtn" class="btn" style="display:none; font-size:0.7rem;">+ 新增服务</button></div>
            <div id="servicesLibrary" class="library-grid"></div>
        </div>
        <!-- 产品库 -->
        <div class="card">
            <div class="card-header"><h3>🧴 居家产品</h3><button id="addProductBtn" class="btn" style="display:none; font-size:0.7rem;">+ 新增产品</button></div>
            <div id="productsLibrary" class="library-grid"></div>
        </div>
    </div>

    <!-- 套餐预设区 + 报价区 -->
    <div class="quote-section">
        <div class="quote-header">
            <h3>📋 当前报价单 (可临时修改)</h3>
            <div class="package-bar">
                <span style="font-size:0.75rem;">📦 快速套餐：</span>
                <select id="packageSelect" class="package-select">
                    <option value="">-- 加载预设套餐 --</option>
                    <option value="microneedling">Microneedling 套餐 (服务+产品)</option>
                </select>
                <button id="saveAsPackageBtn" class="btn" style="font-size:0.7rem; display:none;">💾 保存为套餐</button>
                <button id="deletePackageBtn" class="btn" style="font-size:0.7rem; display:none;">🗑️ 删除套餐</button>
            </div>
        </div>
        <div id="quoteItemsContainer" class="quote-items-container">
            <div style="text-align:center; color:#b7a99a; padding:2rem;">暂无项目，点击上方 + 添加服务或产品</div>
        </div>
        <div class="total-bar">
            <div>💰 合计 (含12%税)</div>
            <div class="total-amount">$<span id="grandTotal">0.00</span></div>
            <div><button id="generateQuoteBtn" class="btn btn-primary">📄 生成专业报价单</button></div>
        </div>
    </div>
    <div class="footer-note">✦ 点击项目可直接修改名称/价格(仅本次报价) ✦ 数量/折扣实时计算 ✦ 管理员登入后可增删改服务/产品/套餐 ✦</div>
</div>

<!-- 报价单模态窗 -->
<div id="quoteModal" class="quote-modal">
    <div class="quote-modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;"><h3 style="font-family:Playfair Display;">📄 正式报价单</h3><button id="closeModalBtn" style="background:none; border:none; font-size:1.8rem; cursor:pointer;">&times;</button></div>
        <div id="modalQuoteContent"></div>
        <div style="display:flex; gap:1rem; justify-content:flex-end; margin-top:1.5rem;">
            <button id="printQuoteBtn" class="btn btn-outline">🖨️ 打印 / PDF</button>
            <button id="emailQuoteBtn" class="btn btn-primary">📧 邮件发送</button>
        </div>
    </div>
</div>

<script>
    // ================= 配置 =================
    const SUPABASE_URL = "https://dmrskyskryrdclknezth.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtcnNreXNrcnlyZGNsa25lenRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE2MzgsImV4cCI6MjA4OTk0NzYzOH0.Dnced4YAY24fE6kLxOe9YuR6Wrgt8pYcqKcjMFWDrY8";
    
    // 密码 (实际生产可存supabase，此处硬编码示例)
    const PAGE_ACCESS_PASSWORD = "clinic2024";     // 开页密码
    const ADMIN_PASSWORD = "admin123";             // 管理员共用密码
    
    let supabase = null;
    let isAdminMode = false;       // 是否管理员编辑模式
    let isPageUnlocked = false;
    
    // 主数据
    let services = [];     // { id, name, price }
    let products = [];
    let packages = [];      // [{ id, name, serviceIds, productIds }]
    
    // 当前报价单 (服务+产品混合)
    let currentQuote = [];   // 每个元素: { id, type, customName, customPrice, quantity, discountPercent, discountAmount, originalPrice }
    
    // ---------- 辅助函数 ----------
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    // 计算单项最终价格
    function calcItemFinalPrice(item) {
        let basePrice = (item.customPrice !== undefined && item.customPrice !== null) ? item.customPrice : item.originalPrice;
        let raw = basePrice * item.quantity;
        let discount = 0;
        if (item.discountAmount > 0) discount = item.discountAmount;
        else if (item.discountPercent > 0) discount = raw * (item.discountPercent / 100);
        return Math.max(0, raw - discount);
    }
    
    // 更新总价并刷新UI
    function updateTotalAndRenderQuote() {
        renderQuoteList();
        let subtotal = 0;
        currentQuote.forEach(item => { subtotal += calcItemFinalPrice(item); });
        let totalWithTax = subtotal * 1.12;
        document.getElementById('grandTotal').innerText = totalWithTax.toFixed(2);
    }
    
    // 渲染报价单列表
    function renderQuoteList() {
        const container = document.getElementById('quoteItemsContainer');
        if (!container) return;
        if (currentQuote.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#b7a99a; padding:2rem;">暂无项目，点击上方 + 添加服务或产品</div>';
            return;
        }
        container.innerHTML = currentQuote.map((item, idx) => {
            const displayName = item.customName || (item.type === 'service' ? services.find(s=>s.id===item.id)?.name : products.find(p=>p.id===item.id)?.name) || '项目';
            const displayPrice = (item.customPrice !== undefined && item.customPrice !== null) ? item.customPrice : item.originalPrice;
            const finalPrice = calcItemFinalPrice(item);
            return `<div class="quote-item" data-idx="${idx}">
                <div class="item-details">
                    <div style="font-weight:600; display:flex; gap:6px; align-items:center;">
                        <span class="editable-name" data-idx="${idx}" style="cursor:pointer; border-bottom:1px dashed #cbbcaa;">📝 ${escapeHtml(displayName)}</span>
                        <span style="font-size:0.65rem; background:#f3ede7; padding:2px 8px; border-radius:20px;">${item.type === 'service' ? '服务' : '产品'}</span>
                    </div>
                    <div class="editable-price" data-idx="${idx}" style="cursor:pointer; font-size:0.7rem; color:#b99f87;">💰 $${displayPrice.toFixed(2)}</div>
                </div>
                <div class="item-controls">
                    <span style="font-size:0.7rem;">数量</span>
                    <input type="number" class="qty-input" data-idx="${idx}" value="${item.quantity}" min="1" step="1" style="width:55px;">
                    <span style="font-size:0.7rem;">%折</span>
                    <input type="number" class="discount-percent" data-idx="${idx}" value="${item.discountPercent}" min="0" max="100" step="1" style="width:55px;">
                    <span style="font-size:0.7rem;">$减</span>
                    <input type="number" class="discount-amount" data-idx="${idx}" value="${item.discountAmount}" min="0" step="1" style="width:65px;">
                    <span style="font-weight:700; min-width:70px;">$${finalPrice.toFixed(2)}</span>
                    <button class="remove-item" data-idx="${idx}">✕</button>
                </div>
            </div>`;
        }).join('');
        
        // 绑定编辑事件
        document.querySelectorAll('.editable-name').forEach(el => {
            el.onclick = (e) => { inlineEdit(el, 'name'); };
        });
        document.querySelectorAll('.editable-price').forEach(el => {
            el.onclick = (e) => { inlineEdit(el, 'price'); };
        });
        function inlineEdit(element, field) {
            const idx = parseInt(element.dataset.idx);
            const item = currentQuote[idx];
            const currentVal = field === 'name' ? (item.customName || (item.type==='service'?services.find(s=>s.id===item.id)?.name:products.find(p=>p.id===item.id)?.name)) : (item.customPrice !== undefined ? item.customPrice : item.originalPrice);
            const newVal = prompt(`编辑${field === 'name' ? '名称' : '价格'}`, currentVal);
            if (newVal !== null) {
                if (field === 'name') item.customName = newVal || null;
                else { let priceNum = parseFloat(newVal); if (!isNaN(priceNum) && priceNum>=0) item.customPrice = priceNum; }
                updateTotalAndRenderQuote();
                saveQuoteToLocal();
            }
        }
        
        // 数量/折扣事件
        document.querySelectorAll('.qty-input, .discount-percent, .discount-amount').forEach(inp => {
            inp.onchange = (e) => {
                const idx = parseInt(inp.dataset.idx);
                const item = currentQuote[idx];
                if (inp.classList.contains('qty-input')) item.quantity = Math.max(1, parseInt(inp.value) || 1);
                else if (inp.classList.contains('discount-percent')) { item.discountPercent = Math.min(100, Math.max(0, parseInt(inp.value) || 0)); if(item.discountPercent>0) item.discountAmount=0; }
                else if (inp.classList.contains('discount-amount')) { item.discountAmount = Math.max(0, parseFloat(inp.value) || 0); if(item.discountAmount>0) item.discountPercent=0; }
                updateTotalAndRenderQuote();
                saveQuoteToLocal();
            };
        });
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.onclick = (e) => { const idx = parseInt(btn.dataset.idx); currentQuote.splice(idx,1); updateTotalAndRenderQuote(); saveQuoteToLocal(); };
        });
    }
    
    // 添加项目到报价单
    function addToQuote(type, id, originalPrice, name) {
        // 检查是否已存在 (简单去重，同类型同id)
        if (currentQuote.some(i => i.id === id && i.type === type)) { alert("该项目已在报价单中"); return; }
        currentQuote.push({
            id, type,
            customName: null,
            customPrice: null,
            quantity: 1,
            discountPercent: 0,
            discountAmount: 0,
            originalPrice: originalPrice,
            originalName: name
        });
        updateTotalAndRenderQuote();
        saveQuoteToLocal();
    }
    
    // 保存报价单到本地存储 (临时)
    function saveQuoteToLocal() { localStorage.setItem('clinic_current_quote', JSON.stringify(currentQuote)); }
    function loadQuoteFromLocal() { const saved = localStorage.getItem('clinic_current_quote'); if(saved) currentQuote = JSON.parse(saved); else currentQuote = []; updateTotalAndRenderQuote(); }
    
    // 渲染服务/产品库 (根据管理员模式显示编辑删除按钮)
    async function renderLibraries() {
        const servicesContainer = document.getElementById('servicesLibrary');
        const productsContainer = document.getElementById('productsLibrary');
        if (!servicesContainer) return;
        servicesContainer.innerHTML = services.map(s => `
            <div class="lib-item" data-id="${s.id}">
                <div class="lib-info"><div class="name">${escapeHtml(s.name)}</div><div class="price">$${s.price}</div></div>
                <div class="lib-actions">
                    <button class="add-to-quote" data-type="service" data-id="${s.id}" data-price="${s.price}" data-name="${escapeHtml(s.name)}">+ 加入报价</button>
                    ${isAdminMode ? `<button class="edit-btn" data-type="service" data-id="${s.id}">✎</button><button class="delete-btn" data-type="service" data-id="${s.id}">🗑️</button>` : ''}
                </div>
            </div>
        `).join('');
        productsContainer.innerHTML = products.map(p => `
            <div class="lib-item" data-id="${p.id}">
                <div class="lib-info"><div class="name">${escapeHtml(p.name)}</div><div class="price">$${p.price}</div></div>
                <div class="lib-actions">
                    <button class="add-to-quote" data-type="product" data-id="${p.id}" data-price="${p.price}" data-name="${escapeHtml(p.name)}">+ 加入报价</button>
                    ${isAdminMode ? `<button class="edit-btn" data-type="product" data-id="${p.id}">✎</button><button class="delete-btn" data-type="product" data-id="${p.id}">🗑️</button>` : ''}
                </div>
            </div>
        `).join('');
        
        // 绑定加入报价事件
        document.querySelectorAll('.add-to-quote').forEach(btn => {
            btn.onclick = () => { addToQuote(btn.dataset.type, btn.dataset.id, parseFloat(btn.dataset.price), btn.dataset.name); };
        });
        if (isAdminMode) {
            document.querySelectorAll('.edit-btn').forEach(btn => { btn.onclick = () => editItem(btn.dataset.type, btn.dataset.id); });
            document.querySelectorAll('.delete-btn').forEach(btn => { btn.onclick = () => deleteItem(btn.dataset.type, btn.dataset.id); });
        }
    }
    
    async function editItem(type, id) {
        let item = type === 'service' ? services.find(s=>s.id===id) : products.find(p=>p.id===id);
        if(!item) return;
        let newName = prompt("新名称", item.name);
        if(newName && newName.trim()) item.name = newName.trim();
        let newPrice = parseFloat(prompt("新价格", item.price));
        if(!isNaN(newPrice)) item.price = newPrice;
        if(type === 'service') await supabase.from('services').update({name:item.name, price:item.price}).eq('id',id);
        else await supabase.from('products').update({name:item.name, price:item.price}).eq('id',id);
        await loadDataFromSupabase();
        renderLibraries();
    }
    async function deleteItem(type, id) {
        if(!confirm(`确定删除该${type==='service'?'服务':'产品'}吗？会影响套餐。`)) return;
        if(type === 'service') await supabase.from('services').delete().eq('id',id);
        else await supabase.from('products').delete().eq('id',id);
        await loadDataFromSupabase();
        renderLibraries();
    }
    
    // 套餐加载
    function loadPackage(packageName) {
        if(packageName === 'microneedling') {
            // Microneedling套餐: 服务microneedling + 产品 Exo-GF
            const microneedlingService = services.find(s => s.name.toLowerCase().includes('microneedling'));
            const exoGfProduct = products.find(p => p.name.toLowerCase().includes('exo-gf'));
            if(microneedlingService && !currentQuote.some(i=>i.id===microneedlingService.id && i.type==='service')) 
                addToQuote('service', microneedlingService.id, microneedlingService.price, microneedlingService.name);
            else alert("服务未找到或已存在");
            if(exoGfProduct && !currentQuote.some(i=>i.id===exoGfProduct.id && i.type==='product'))
                addToQuote('product', exoGfProduct.id, exoGfProduct.price, exoGfProduct.name);
            else if(!exoGfProduct) alert("产品 Exo-GF 未在库中找到");
        }
    }
    
    // 保存当前报价单为套餐 (管理员)
    async function saveCurrentAsPackage() {
        if(!isAdminMode) { alert("请先管理员登入"); return; }
        const packageName = prompt("套餐名称:", "自定义套餐");
        if(!packageName) return;
        const serviceIds = currentQuote.filter(i=>i.type==='service').map(i=>i.id);
        const productIds = currentQuote.filter(i=>i.type==='product').map(i=>i.id);
        const newId = generateId();
        const { error } = await supabase.from('packages').insert({id:newId, name:packageName, service_ids:serviceIds, product_ids:productIds});
        if(error) alert("保存失败"+error.message);
        else { alert("套餐已保存"); await loadDataFromSupabase(); }
    }
    async function deletePackageFromDb() {
        if(!isAdminMode) return;
        const pkgId = prompt("输入要删除的套餐ID (查看控制台 packages 列表)");
        if(pkgId) await supabase.from('packages').delete().eq('id',pkgId);
        await loadDataFromSupabase();
    }
    
    // 生成专业报价单HTML
    function buildQuoteHTML() {
        let itemsRows = "";
        let subtotal = 0;
        for(let item of currentQuote) {
            let origName = item.type==='service' ? services.find(s=>s.id===item.id)?.name : products.find(p=>p.id===item.id)?.name;
            let displayName = item.customName || origName;
            let unitPrice = (item.customPrice!==undefined && item.customPrice!==null) ? item.customPrice : item.originalPrice;
            let finalPrice = calcItemFinalPrice(item);
            subtotal += finalPrice;
            let discountText = "";
            if(item.discountPercent>0) discountText = `${item.discountPercent}% off`;
            else if(item.discountAmount>0) discountText = `$${item.discountAmount} off`;
            itemsRows += `<tr><td>${escapeHtml(displayName)} ${discountText?`<span style="background:#f9efe6; font-size:11px; padding:2px 8px; border-radius:40px;">${discountText}</span>`:''}</td><td>$${unitPrice.toFixed(2)}</td><td>${item.quantity}</td><td class="amount-col">$${finalPrice.toFixed(2)}</td></tr>`;
        }
        let tax = subtotal * 0.12;
        let grand = subtotal + tax;
        return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AuraClinic_Quote</title><style>body{font-family:'Inter',sans-serif;margin:0;padding:2rem;background:#f5f2ef;} .paper{max-width:720px;margin:0 auto;background:white;border-radius:28px;padding:2rem;} h1{font-family:'Playfair Display';color:#5e4e3c;} table{width:100%;border-collapse:collapse;margin:20px 0;} th{text-align:left;padding:8px 0;border-bottom:1px solid #e2d6cc;} td{padding:10px 0;border-bottom:1px solid #efe5dc;} .amount-col{text-align:right;} .total{text-align:right;margin-top:20px;border-top:2px solid #e4d9cf;padding-top:16px;} .grand{font-size:20px;font-weight:700;}</style></head><body><div class="paper"><div style="text-align:center;"><h1>AURA CLINIC</h1><p>专业报价单 · 内部治疗+护理方案</p><p>日期: ${new Date().toLocaleDateString()}</p></div><table><thead><tr><th>项目</th><th>单价</th><th>数量</th><th class="amount-col">金额</th></tr></thead><tbody>${itemsRows}</tbody></table><div class="total"><div>小计: $${subtotal.toFixed(2)}</div><div>税费(12%): $${tax.toFixed(2)}</div><div class="grand">总计: $${grand.toFixed(2)}</div></div><div style="margin-top:30px; text-align:center; font-size:11px; color:#b2a088;">本报价单由Aura诊所内部系统生成，有效期14天。</div></div></body></html>`;
    }
    function showQuoteModal() { 
        const html = buildQuoteHTML();
        document.getElementById('modalQuoteContent').innerHTML = `<iframe srcdoc="${escapeHtml(html).replace(/"/g, '&quot;')}" style="width:100%; height:460px; border:none;"></iframe>`;
        document.getElementById('quoteModal').classList.add('show');
    }
    function printQuote() { const win = window.open('','_blank'); win.document.write(buildQuoteHTML()); win.document.close(); win.print(); }
    function emailQuote() { const htmlBlob = new Blob([buildQuoteHTML()], {type:'text/html'}); const url = URL.createObjectURL(htmlBlob); window.location.href = `mailto:?subject=Aura诊所报价单&body=请查收附件报价单`; setTimeout(()=>URL.revokeObjectURL(url),200); alert("邮件客户端已打开，请手动附件预览内容。"); }
    
    // 数据加载
    async function loadDataFromSupabase() {
        if(!supabase) return;
        const {data:sData} = await supabase.from('services').select('*');
        if(sData && sData.length) services = sData;
        else services = [{id:"srv1", name:"激光脱毛", price:250},{id:"srv2", name:"Microneedling", price:450},{id:"srv3", name:"Excel V - Rejuvenate", price:350}];
        const {data:pData} = await supabase.from('products').select('*');
        if(pData && pData.length) products = pData;
        else products = [{id:"p1",name:"Exo-GF",price:275},{id:"p2",name:"Clarify Cleanser",price:50},{id:"p3",name:"Retinol",price:66}];
        const {data:packData} = await supabase.from('packages').select('*');
        if(packData && packData.length) packages = packData;
        renderLibraries();
    }
    
    // 初始化supabase
    async function initSupabaseAndApp() {
        if(typeof supabaseClient === 'undefined') { setTimeout(initSupabaseAndApp, 300); return; }
        supabase = supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await loadDataFromSupabase();
        loadQuoteFromLocal();
        // UI按钮事件
        document.getElementById('generateQuoteBtn').onclick = showQuoteModal;
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('quoteModal').classList.remove('show');
        document.getElementById('printQuoteBtn').onclick = printQuote;
        document.getElementById('emailQuoteBtn').onclick = emailQuote;
        document.getElementById('packageSelect').onchange = (e) => { if(e.target.value) loadPackage(e.target.value); e.target.value=''; };
        document.getElementById('saveAsPackageBtn').onclick = saveCurrentAsPackage;
        document.getElementById('deletePackageBtn').onclick = deletePackageFromDb;
        document.getElementById('adminLoginBtn').onclick = () => { let pwd = prompt("管理员密码:"); if(pwd === ADMIN_PASSWORD) { isAdminMode=true; document.getElementById('adminStatusBadge').style.display='inline-block'; document.getElementById('adminLoginBtn').style.display='none'; document.getElementById('logoutAdminBtn').style.display='inline-block'; document.getElementById('addServiceBtn').style.display='inline-block'; document.getElementById('addProductBtn').style.display='inline-block'; document.getElementById('saveAsPackageBtn').style.display='inline-block'; document.getElementById('deletePackageBtn').style.display='inline-block'; renderLibraries(); } else alert("密码错误"); };
        document.getElementById('logoutAdminBtn').onclick = () => { isAdminMode=false; document.getElementById('adminStatusBadge').style.display='none'; document.getElementById('adminLoginBtn').style.display='inline-block'; document.getElementById('logoutAdminBtn').style.display='none'; document.getElementById('addServiceBtn').style.display='none'; document.getElementById('addProductBtn').style.display='none'; document.getElementById('saveAsPackageBtn').style.display='none'; document.getElementById('deletePackageBtn').style.display='none'; renderLibraries(); };
        document.getElementById('addServiceBtn').onclick = async () => { if(!isAdminMode) return; let name = prompt("服务名称"); let price = parseFloat(prompt("价格")); if(name && price) { let newId=generateId(); await supabase.from('services').insert({id:newId, name, price}); await loadDataFromSupabase(); renderLibraries(); } };
        document.getElementById('addProductBtn').onclick = async () => { if(!isAdminMode) return; let name = prompt("产品名称"); let price = parseFloat(prompt("价格")); if(name && price) { let newId=generateId(); await supabase.from('products').insert({id:newId, name, price}); await loadDataFromSupabase(); renderLibraries(); } };
    }
    
    // 开页密码验证
    document.getElementById('unlockPageBtn').onclick = () => {
        let pwd = document.getElementById('pagePasswordInput').value;
        if(pwd === PAGE_ACCESS_PASSWORD) {
            isPageUnlocked = true;
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            initSupabaseAndApp();
        } else { document.getElementById('lockError').innerText = '密码错误，无权访问'; }
    };
</script>
</body>
</html>
