<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre & Post Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#f5efe9; font-family:'Inter',sans-serif; padding:2rem 1rem; }
        .app { max-width:1400px; margin:0 auto; background:#faf7f2; border-radius:32px; border:1px solid #e8dfd4; padding:2rem; }
        h1 { font-family:'Montserrat',sans-serif; font-weight:300; font-size:1.8rem; color:#7f6e5d; text-align:center; margin-bottom:2rem; text-transform:uppercase; }
        .two-columns { display:grid; grid-template-columns:280px 1fr; gap:1.5rem; min-height:600px; }
        .doc-sidebar { background:#fff9f2; border-radius:24px; padding:1.2rem; border:1px solid #e7dbd0; }
        .doc-sidebar h3 { font-family:'Montserrat',sans-serif; font-size:1rem; font-weight:600; color:#8f7e6b; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid #e2d4c6; }
        .doc-list { list-style:none; max-height:500px; overflow-y:auto; }
        .doc-item { padding:0.8rem 1rem; margin-bottom:0.5rem; background:#f5efe8; border-radius:16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:all 0.2s; }
        .doc-item:hover { background:#e9dfd4; transform:translateX(4px); }
        .doc-item.active { background:#b99f87; color:white; }
        .btn-sidebar { width:100%; margin-top:1rem; padding:0.6rem; background:#e9dfd4; border:none; border-radius:40px; cursor:pointer; font-size:0.75rem; font-weight:500; }
        .doc-editor { background:#fff9f2; border-radius:24px; padding:1.5rem; border:1px solid #e7dbd0; }
        .doc-title { width:100%; font-size:1.5rem; border:none; background:transparent; border-bottom:2px solid #e2d4c6; margin-bottom:1.5rem; padding:0.5rem 0; outline:none; color:#5f5347; }
        .section { background:#fefcf8; border-radius:16px; border:1px solid #e7dbd0; margin-bottom:1rem; overflow:hidden; }
        .section-header { background:#f5efe8; padding:0.5rem 1rem; font-size:0.75rem; font-weight:600; color:#b99f87; border-bottom:1px solid #e7dbd0; }
        .section-textarea { width:100%; min-height:100px; padding:0.8rem; border:none; font-size:0.8rem; resize:vertical; outline:none; }
        .editor-actions { display:flex; gap:1rem; justify-content:flex-end; margin-top:1rem; }
        .btn { padding:0.5rem 1.2rem; border-radius:40px; border:none; cursor:pointer; font-size:0.8rem; }
        .btn-save { background:#b99f87; color:white; }
        .btn-print, .btn-email { background:#e9dfd4; color:#5f5347; }
        .login-prompt { margin-top:1rem; padding:0.8rem; background:#f5efe8; border-radius:12px; text-align:center; font-size:0.7rem; color:#888; }
        #signInBtn { margin-top:8px; width:100%; padding:8px; border-radius:20px; border:none; background:#b99f87; color:white; font-size:13px; cursor:pointer; }
        @media (max-width:750px) { .two-columns { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div class="app">
    <h1>📋 Pre & Post Care</h1>
    <div class="two-columns">
        <div class="doc-sidebar">
            <h3>📄 TREATMENT DOCUMENTS</h3>
            <div id="docList" class="doc-list"></div>

            <div id="authButtons" style="display:none;">
                <button class="btn-sidebar" id="newDocBtn">✨ New Document</button>
                <button class="btn-sidebar" id="updateDocBtn" style="margin-top:0.5rem;">💾 Update</button>
                <button class="btn-sidebar" id="deleteDocBtn" style="margin-top:0.5rem;">🗑️ Delete</button>
            </div>

            <div id="loginPrompt" class="login-prompt">
                🔒 Sign in to edit<br>
                <button id="signInBtn">Sign in with Google</button>
            </div>
        </div>

        <div class="doc-editor">
            <input type="text" id="docTitle" class="doc-title" placeholder="Document Title">
            
            <div class="section">
                <div class="section-header">📋 RESULT & PLANS</div>
                <textarea class="section-textarea" id="resultPlans"></textarea>
            </div>

            <!-- 这里是你新加的：Contraindications -->
            <div class="section">
                <div class="section-header">⚠️ Contraindications</div>
                <textarea class="section-textarea" id="contraindications"></textarea>
            </div>

            <div class="section">
                <div class="section-header">🩺 PRE TREATMENT</div>
                <textarea class="section-textarea" id="preTreatment"></textarea>
            </div>

            <div class="section">
                <div class="section-header">⚠️ SIDE EFFECTS</div>
                <textarea class="section-textarea" id="sideEffects"></textarea>
            </div>

            <div class="section">
                <div class="section-header">🌸 POST CARE - DO</div>
                <textarea class="section-textarea" id="postDo"></textarea>
            </div>

            <div class="section">
                <div class="section-header">🚫 POST CARE - AVOID</div>
                <textarea class="section-textarea" id="postAvoid"></textarea>
            </div>

            <div class="editor-actions">
                <button class="btn btn-save" id="saveLocalBtn">💾 Save</button>
                <button class="btn btn-print" id="printDocBtn">🖨️ Print</button>
                <button class="btn btn-email" id="emailDocBtn">📧 Email</button>
            </div>
        </div>
    </div>
</div>

<script>
let isAuthenticated = false;

function fakeGoogleSignIn() {
  alert("Login success");
  isAuthenticated = true;
  document.getElementById("authButtons").style.display = "block";
  document.getElementById("loginPrompt").style.display = "none";
}

let documents = [];
let currentId = null;

const defaultDocs = [
    { id: "1", name: "Laser Hair Removal", resultPlans: "", contraindications: "", preTreatment: "", sideEffects: "", postDo: "", postAvoid: "" },
    { id: "2", name: "Microneedling", resultPlans: "", contraindications: "", preTreatment: "", sideEffects: "", postDo: "", postAvoid: "" }
];

function loadDocs() {
    documents = defaultDocs;
    renderDocList();
    loadDoc(documents[0].id);
}

function renderDocList() {
    const el = document.getElementById('docList');
    el.innerHTML = documents.map(d => `
        <div class="doc-item ${currentId===d.id?'active':''}" data-id="${d.id}">
            <span>📄 ${d.name}</span>
        </div>
    `).join('');
    document.querySelectorAll('.doc-item').forEach(i => {
        i.addEventListener('click', () => loadDoc(i.dataset.id));
    });
}

function loadDoc(id) {
    const d = documents.find(x => x.id === id);
    if (!d) return;
    currentId = id;
    document.getElementById('docTitle').value = d.name;
    document.getElementById('resultPlans').value = d.resultPlans || '';
    document.getElementById('contraindications').value = d.contraindications || '';
    document.getElementById('preTreatment').value = d.preTreatment || '';
    document.getElementById('sideEffects').value = d.sideEffects || '';
    document.getElementById('postDo').value = d.postDo || '';
    document.getElementById('postAvoid').value = d.postAvoid || '';
}

function saveCurrentDoc() {
    if (!isAuthenticated) { alert("Please sign in"); return; }
    alert("Saved successfully!");
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('signInBtn').onclick = fakeGoogleSignIn;
    document.getElementById('saveLocalBtn').onclick = saveCurrentDoc;
    loadDocs();
});
</script>
</body>
</html>
