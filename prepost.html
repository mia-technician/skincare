<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre & Post Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5efe9; font-family: 'Inter', sans-serif; padding: 2rem 1rem; }
        .app { max-width: 1400px; margin: 0 auto; background: #faf7f2; border-radius: 32px; border: 1px solid #e8dfd0; padding: 2rem; }
        h1 { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 1.8rem; color: #7f6e5d; text-align: center; margin-bottom: 2rem; text-transform: uppercase; }
        .two-columns { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; min-height: 600px; }
        
        /* 左侧样式 - 只保留文档列表 */
        .doc-sidebar { background: #fff9f2; border-radius: 24px; padding: 1.2rem; border: 1px solid #e7dbd0; }
        .doc-sidebar h3 { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 600; color: #8f7e6d; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e2d4c6; letter-spacing: 0.5px; }
        .doc-list { list-style: none; max-height: 500px; overflow-y: auto; margin-bottom: 1rem; }
        
        /* 文档列表项样式 */
        .doc-item {
            padding: 0.6rem 0.9rem;
            margin-bottom: 0.4rem;
            background: #f5efe8;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            font-size: 0.75rem;
            font-weight: 450;
            color: #5f5347;
        }
        .doc-item:hover {
            background: #e9dfd4;
            transform: translateX(3px);
        }
        .doc-item.active {
            background: #b99f87;
            color: white;
        }
        .doc-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            display: inline-block;
        }
        
        /* 右侧样式 */
        .doc-editor { background: #fff9f2; border-radius: 24px; padding: 1.5rem; border: 1px solid #e7dbd0; }
        
        /* 按钮工具栏 - 放在右侧内容框上面 */
        .action-toolbar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e8dfd0;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 0.6rem 1.2rem;
            background: #b99f87;
            color: #fff;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn:hover {
            background: #9e846c;
            transform: translateY(-1px);
        }
        .action-btn:active {
            transform: translateY(0);
        }
        
        .doc-title { width: 100%; font-size: 1.5rem; border: none; background: transparent; border-bottom: 2px solid #e2d4c6; margin-bottom: 1rem; padding: 0.5rem 0; outline: none; color: #5f5347; font-weight: 500; }
        .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .toolbar button { padding: 4px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .toolbar button:hover { background: #f0e8e0; border-color: #b99f87; }
        .section { background: transparent; border-radius: 0; border: none; margin-bottom: 1rem; overflow: hidden; }
        .section-header { background: transparent; padding: 0.3rem 0; font-size: 0.75rem; font-weight: 600; color: #b99f87; border: none; letter-spacing: 0.3px; }
        .section-content { padding: 0.4rem 0; white-space: pre-wrap; line-height: 1.5; min-height: 24px; font-size: 13px; color: #333; outline: none; }
        .editor-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem; }
        .btn { padding: 0.5rem 1.2rem; border-radius: 40px; border: none; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .btn-email { background: #b99f87; color: white; }
        .btn-email:hover { background: #9e846c; }
        .btn-print { background: #e9dfd4; color: #333; }
        .btn-print:hover { background: #ddd0c2; }
        
        /* 滚动条美化 */
        .doc-list::-webkit-scrollbar {
            width: 6px;
        }
        .doc-list::-webkit-scrollbar-track {
            background: #f0e8e0;
            border-radius: 10px;
        }
        .doc-list::-webkit-scrollbar-thumb {
            background: #b99f87;
            border-radius: 10px;
        }
        .doc-list::-webkit-scrollbar-thumb:hover {
            background: #9e846c;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #4caf50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            font-size: 14px;
            animation: slideInRight 0.3s ease;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media print { body * { visibility: hidden; } .doc-editor, .doc-editor * { visibility: visible; } .doc-editor { position: absolute; left: 0; top: 0; width: 100%; } .toolbar, .editor-actions { display: none !important; } }
        @media (max-width: 750px) { .two-columns { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app">
        <h1>📋 Pre & Post Care</h1>
        <div class="two-columns">
            <!-- 左侧：只保留文档列表 -->
            <div class="doc-sidebar">
                <h3>📄 DOCUMENTS</h3>
                <div id="docList" class="doc-list"></div>
            </div>
            
            <!-- 右侧：编辑区域 -->
            <div class="doc-editor">
                <!-- 按钮工具栏 - 四个按钮放在这里 -->
                <div class="action-toolbar">
                    <button class="action-btn" id="addNewBtn">➕ New Document</button>
                    <button class="action-btn" id="saveBtn">💾 Save as New</button>
                    <button class="action-btn" id="updateBtn">✏️ Update Current</button>
                    <button class="action-btn" id="deleteBtn">🗑️ Delete Current</button>
                </div>
                
                <input type="text" id="docTitle" class="doc-title" placeholder="Document Title">
                <div class="toolbar">
                    <button onclick="formatBold('resultPlans')">Bold</button>
                    <button onclick="formatBullet('resultPlans')">• Bullet List</button>
                </div>
                <div class="section">
                    <div class="section-header">📋 RESULTS & TREATMENT PLANS</div>
                    <div class="section-content" id="resultPlans" contenteditable="true"></div>
                </div>
                <div class="section">
                    <div class="section-header">❗️ CONTRAINDICATIONS</div>
                    <div class="section-content" id="contraindications" contenteditable="true"></div>
                </div>
                <div class="section">
                    <div class="section-header">🩺 PRE TREATMENT CARE</div>
                    <div class="section-content" id="preTreatment" contenteditable="true"></div>
                </div>
                <div class="section">
                    <div class="section-header">⚠️ POSSIBLE SIDE EFFECT</div>
                    <div class="section-content" id="sideEffects" contenteditable="true"></div>
                </div>
                <div class="section">
                    <div class="section-header">🌸 POST CARE - WHAT TO DO</div>
                    <div class="section-content" id="postDo" contenteditable="true"></div>
                </div>
                <div class="section">
                    <div class="section-header">🚫 POST CARE - WHAT TO AVOID</div>
                    <div class="section-content" id="postAvoid" contenteditable="true"></div>
                </div>
                <div class="section">
                    <div class="section-header">📞 If you have any unusual reactions or concerns, please contact our office at 604-580-2464 OR infobclaser@dermapure.com</div>
                </div>
                <div class="editor-actions">
                    <button class="btn btn-email" id="emailBtn">📧 Send as Email</button>
                    <button class="btn btn-print" id="printBtn">🖨️ Print / PDF</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
<script>
    // Configuration
    const CLOUD_PASSWORD = "123456";
    let currentId = null;
    let documents = [];

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', async function() {
        if (typeof supabase === 'undefined') {
            alert('Error: Supabase not initialized. Please check supabase.js');
            return;
        }
        
        await loadDocuments();
        
        document.getElementById('addNewBtn').addEventListener('click', addNewDocument);
        document.getElementById('saveBtn').addEventListener('click', saveDocument);
        document.getElementById('updateBtn').addEventListener('click', updateDocument);
        document.getElementById('deleteBtn').addEventListener('click', deleteDocument);
        document.getElementById('emailBtn').addEventListener('click', sendEmailSimple);
        document.getElementById('printBtn').addEventListener('click', () => window.print());
    });

    async function loadDocuments() {
        try {
            const { data, error } = await supabase
                .from('prepost_documents')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            documents = data || [];
            renderDocumentList();
        } catch (error) {
            console.error('Error loading documents:', error);
            alert('Failed to load documents: ' + error.message);
        }
    }

    function renderDocumentList() {
        const docList = document.getElementById('docList');
        if (!docList) return;
        
        if (documents.length === 0) {
            docList.innerHTML = '<div style="padding: 1rem; text-align: center; color: #999; font-size: 0.75rem;">No documents</div>';
            return;
        }
        
        docList.innerHTML = documents.map(doc => `
            <div class="doc-item ${currentId === doc.id ? 'active' : ''}" onclick="selectDocument('${doc.id}')">
                <span>📄 ${escapeHtml(doc.title || 'Untitled')}</span>
            </div>
        `).join('');
    }

    window.selectDocument = function(id) {
        const doc = documents.find(d => String(d.id) === String(id));
        if (!doc) return;
        
        currentId = doc.id;
        document.getElementById('docTitle').value = doc.title || '';
        document.getElementById('resultPlans').innerText = doc.result_plans || '';
        document.getElementById('contraindications').innerText = doc.contraindications || '';
        document.getElementById('preTreatment').innerText = doc.pre_treatment || '';
        document.getElementById('sideEffects').innerText = doc.side_effects || '';
        document.getElementById('postDo').innerText = doc.post_do || '';
        document.getElementById('postAvoid').innerText = doc.post_avoid || '';
        
        renderDocumentList();
    };

    function getCurrentDocumentData() {
        return {
            title: document.getElementById('docTitle').value.trim() || 'Untitled',
            result_plans: document.getElementById('resultPlans').innerText || '',
            contraindications: document.getElementById('contraindications').innerText || '',
            pre_treatment: document.getElementById('preTreatment').innerText || '',
            side_effects: document.getElementById('sideEffects').innerText || '',
            post_do: document.getElementById('postDo').innerText || '',
            post_avoid: document.getElementById('postAvoid').innerText || ''
        };
    }

    function clearEditor() {
        document.getElementById('docTitle').value = '';
        document.getElementById('resultPlans').innerText = '';
        document.getElementById('contraindications').innerText = '';
        document.getElementById('preTreatment').innerText = '';
        document.getElementById('sideEffects').innerText = '';
        document.getElementById('postDo').innerText = '';
        document.getElementById('postAvoid').innerText = '';
    }

    function addNewDocument() {
        clearEditor();
        currentId = null;
        renderDocumentList();
    }

    async function saveDocument() {
        const password = prompt('Enter cloud storage password:');
        if (password !== CLOUD_PASSWORD) {
            alert('Incorrect password! Cannot save.');
            return;
        }
        
        const data = getCurrentDocumentData();
        
        try {
            const { error } = await supabase.from('prepost_documents').insert([data]);
            if (error) throw error;
            showToast('Document saved successfully!');
            await loadDocuments();
            clearEditor();
            currentId = null;
        } catch (error) {
            alert('Failed to save: ' + error.message);
        }
    }

    async function updateDocument() {
        if (!currentId) {
            alert('Please select a document to update first.');
            return;
        }
        
        const password = prompt('Enter cloud storage password:');
        if (password !== CLOUD_PASSWORD) {
            alert('Incorrect password! Cannot update.');
            return;
        }
        
        const data = getCurrentDocumentData();
        
        try {
            const { error } = await supabase.from('prepost_documents').update(data).eq('id', currentId);
            if (error) throw error;
            showToast('Document updated successfully!');
            await loadDocuments();
        } catch (error) {
            alert('Failed to update: ' + error.message);
        }
    }

    async function deleteDocument() {
        if (!currentId) {
            alert('Please select a document to delete first.');
            return;
        }
        
        const password = prompt('Enter cloud storage password:');
        if (password !== CLOUD_PASSWORD) {
            alert('Incorrect password! Cannot delete.');
            return;
        }
        
        if (!confirm('Are you sure you want to delete this document? This cannot be undone.')) return;
        
        try {
            const { error } = await supabase.from('prepost_documents').delete().eq('id', currentId);
            if (error) throw error;
            showToast('Document deleted successfully!');
            clearEditor();
            currentId = null;
            await loadDocuments();
        } catch (error) {
            alert('Failed to delete: ' + error.message);
        }
    }

    // Simple email function - opens email client with formatted text
    function sendEmailSimple() {
        const title = document.getElementById('docTitle').value || 'Pre & Post Care Document';
        const currentDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        
        // Build email body with simple but clean formatting
        let emailBody = '';
        emailBody += `${title}\n`;
        emailBody += `${'='.repeat(Math.min(title.length, 50))}\n\n`;
        emailBody += `Date: ${currentDate}\n\n`;
        emailBody += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
        
        // Sections
        const sections = [
            { name: 'RESULTS & TREATMENT PLANS', icon: '📋', id: 'resultPlans' },
            { name: 'CONTRAINDICATIONS', icon: '❗️', id: 'contraindications' },
            { name: 'PRE TREATMENT CARE', icon: '🩺', id: 'preTreatment' },
            { name: 'POSSIBLE SIDE EFFECT', icon: '⚠️', id: 'sideEffects' },
            { name: 'POST CARE - WHAT TO DO', icon: '🌸', id: 'postDo' },
            { name: 'POST CARE - WHAT TO AVOID', icon: '🚫', id: 'postAvoid' }
        ];
        
        let hasContent = false;
        
        sections.forEach(section => {
            const content = document.getElementById(section.id)?.innerText?.trim();
            if (content && content !== '') {
                hasContent = true;
                emailBody += `${section.icon} ${section.name}\n`;
                emailBody += `${'-'.repeat(section.name.length + 2)}\n`;
                emailBody += `${content}\n\n`;
            }
        });
        
        if (!hasContent) {
            emailBody += `(No content available for this document)\n\n`;
        }
        
        // Contact information
        emailBody += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
        emailBody += `📞 CONTACT INFORMATION\n`;
        emailBody += `------------------------\n`;
        emailBody += `If you have any unusual reactions or concerns, please contact us:\n\n`;
        emailBody += `📱 Phone: 604-580-2464\n`;
        emailBody += `✉️ Email: infobclaser@dermapure.com\n\n`;
        emailBody += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
        emailBody += `This document was generated from Pre & Post Care Management System\n`;
        emailBody += `© ${new Date().getFullYear()} All rights reserved\n`;
        
        // Create mailto link
        const subject = encodeURIComponent(title);
        const body = encodeURIComponent(emailBody);
        const mailtoLink = `mailto:?subject=${subject}&body=${body}`;
        
        // Open email client
        window.location.href = mailtoLink;
        
        // Show confirmation
        showToast('Opening email client...');
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.formatBold = function(elementId) {
        const el = document.getElementById(elementId);
        if (el) { el.focus(); document.execCommand('bold', false, null); }
    };
    
    window.formatBullet = function(elementId) {
        const el = document.getElementById(elementId);
        if (el) { el.focus(); document.execCommand('insertUnorderedList', false, null); }
    };
</script>
</body>
</html>
