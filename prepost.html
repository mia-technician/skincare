<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre & Post Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#f5efe9; font-family:'Inter',sans-serif; padding:2rem 1rem; }
        .app { max-width:1400px; margin:0 auto; background:#faf7f2; border-radius:32px; border:1px solid #e8dfd0; padding:2rem; }
        h1 { font-family:'Montserrat',sans-serif; font-weight:300; font-size:1.2rem; color:#7f6e5d; text-align:center; margin-bottom:2rem; text-transform:uppercase; }
        .two-columns { display:grid; grid-template-columns:280px 1fr; gap:1.5rem; min-height:600px; }

        .doc-sidebar { background:#fff9f2; border-radius:24px; padding:1.2rem; border:1px solid #e7dbd0; }
        .doc-sidebar h3 { font-family:'Montserrat',sans-serif; font-size:1rem; font-weight:600; color:#8f7e6; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid #e2d4c6; }
        .doc-list { list-style:none; max-height:500px; overflow-y:auto; margin-bottom:1rem; }
        .doc-item { padding:0.8rem 1rem; margin-bottom:0.5rem; background:#f5efe8; border-radius:16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:all 0.2s; }
        .doc-item:hover { background:#e9dfd4; transform:translateX(4px); }
        .doc-item.active { background:#b99f87; color:white; }

        .btn-add { width:100%; padding:0.6rem; background:#b99f87; color:#fff; border:none; border-radius:40px; cursor:pointer; font-size:0.75rem; font-weight:500; margin-bottom:1rem; }

        .doc-editor { background:#fff9f2; border-radius:24px; padding:1.5rem; border:1px solid #e7dbd0; }
        .doc-title { width:100%; font-size:1.5rem; border:none; background:transparent; border-bottom:2px solid #e2d4c6; margin-bottom:1rem; padding:0.5rem 0; outline:none; color:#5f5347; }

        .toolbar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
        .toolbar button { padding:4px 10px; border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer; font-size:12px; }

        /* 🔥 去掉内容栏边框 + 干净样式 */
        .section {
            background: transparent;
            border-radius: 0;
            border: none;        /* 去掉边框 */
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .section-header {
            background: transparent;
            padding: 0.5rem 0;
            font-size: 0.85rem;
            font-weight: 600;
            color:#b99f87;
            border: none;
        }
        .section-content {
            padding: 0.4rem 0;
            white-space: pre-wrap;
            line-height:1.5;
            min-height: 24px;
        }

        .editor-actions { display:flex; gap:1rem; justify-content:flex-end; margin-top:1rem; }
        .btn { padding:0.5rem 1.2rem; border-radius:40px; border:none; cursor:pointer; font-size:0.8rem; }
        .btn-save { background:#b99f87; color:white; }
        .btn-print { background:#e9dfd4; color:#333; }

        #loginPrompt, #authButtons { display:none; }

        @media print {
            body * { visibility: hidden; }
            .doc-editor, .doc-editor * { visibility: visible; }
            .doc-editor {
                position: absolute;
                left:0; top:0; width:100%;
            }
            .toolbar, .editor-actions { display:none !important; }
        }

        @media (max-width:750px) { .two-columns { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div class="app">
    <h1>📋 Pre & Post Care</h1>
    <div class="two-columns">
        <div class="doc-sidebar">
            <h3>📄 TREATMENT DOCUMENTS</h3>
            <button class="btn-add" id="addNewBtn">➕ Add New Document</button>
            <div id="docList" class="doc-list"></div>
        </div>

        <div class="doc-editor">
            <input type="text" id="docTitle" class="doc-title" placeholder="Document Title">
            <div class="toolbar">
                <button onclick="formatBold('resultPlans')">Bold</button>
                <button onclick="formatBullet('resultPlans')">• Bullet</button>
            </div>

            <div class="section">
                <div class="section-header">📋 RESULT & PLANS</div>
                <div class="section-content" id="resultPlans" contenteditable></div>
            </div>

            <div class="section">
                <div class="section-header">⚠️ Contraindications</div>
                <div class="section-content" id="contraindications" contenteditable></div>
            </div>

            <div class="section">
                <div class="section-header">🩺 PRE TREATMENT</div>
                <div class="section-content" id="preTreatment" contenteditable></div>
            </div>

            <div class="section">
                <div class="section-header">⚠️ SIDE EFFECTS</div>
                <div class="section-content" id="sideEffects" contenteditable></div>
            </div>

            <div class="section">
                <div class="section-header">🌸 POST CARE - DO</div>
                <div class="section-content" id="postDo" contenteditable></div>
            </div>

            <div class="section">
                <div class="section-header">🚫 POST CARE - AVOID</div>
                <div class="section-content" id="postAvoid" contenteditable></div>
            </div>

            <div class="editor-actions">
                <button class="btn btn-save" id="saveBtn">Save</button>
                <button class="btn btn-print" id="printBtn">Print / PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
let documents = [];
let currentId = null;
const STORAGE_KEY = "prepost_data_v3";

const fieldIds = [
    "resultPlans", "contraindications", "preTreatment",
    "sideEffects", "postDo", "postAvoid"
];

function loadFromStorage() {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { try { documents = JSON.parse(s); } catch (e) { resetDefault(); } }
    else resetDefault();
}

function resetDefault() {
    documents = [
        { id: "1", name: "Laser Hair Removal", resultPlans:"", contraindications:"", preTreatment:"", sideEffects:"", postDo:"", postAvoid:"" },
        { id: "2", name: "Microneedling", resultPlans:"", contraindications:"", preTreatment:"", sideEffects:"", postDo:"", postAvoid:"" }
    ];
}

function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(documents));
}

function renderDocList() {
    const el = document.getElementById("docList");
    el.innerHTML = documents.map(d => `
        <div class="doc-item ${currentId === d.id ? 'active' : ''}" data-id="${d.id}">
            <span>📄 ${d.name}</span>
        </div>
    `).join('');
    el.querySelectorAll('.doc-item').forEach(item => {
        item.onclick = () => loadDoc(item.dataset.id);
    });
}

function clearEditor() {
    document.getElementById('docTitle').value = '';
    fieldIds.forEach(id => document.getElementById(id).innerText = '');
    currentId = null;
}

function addNewDocument() {
    clearEditor();
    document.getElementById('docTitle').value = 'New Document';
    currentId = "new-" + Date.now();
}

function loadDoc(id) {
    const d = documents.find(x => x.id === id);
    if (!d) return;
    currentId = id;
    document.getElementById('docTitle').value = d.name || '';
    fieldIds.forEach(id => document.getElementById(id).innerText = d[id] || '');
    renderDocList();
}

function saveCurrent() {
    const name = document.getElementById('docTitle').value.trim() || 'Untitled';
    const data = { name };
    fieldIds.forEach(id => data[id] = document.getElementById(id).innerText);
    
    const exist = documents.find(x => x.id === currentId);
    if (exist) Object.assign(exist, data);
    else { currentId = "doc-" + Date.now(); documents.push({ id: currentId, ...data }); }
    
    saveToStorage();
    renderDocList();
    alert("Saved successfully");
}

function formatBold(fieldId) {
    const el = document.getElementById(fieldId);
    el.focus();
    document.execCommand('bold');
}

function formatBullet(fieldId) {
    const el = document.getElementById(fieldId);
    el.focus();
    document.execCommand('insertUnorderedList');
}

function doPrint() {
    window.print();
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('addNewBtn').onclick = addNewDocument;
    document.getElementById('saveBtn').onclick = saveCurrent;
    document.getElementById('printBtn').onclick = doPrint;
    loadFromStorage();
    renderDocList();
    if (documents.length > 0) loadDoc(documents[0].id);
});
</script>
</body>
</html>
