<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮肤管理术前术后</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, -apple-system, sans-serif}
  body{padding:20px;max-width:800px;margin:0 auto;background:#f7f9fa}
  .container{background:#fff;padding:24px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
  h1{font-size:22px;margin-bottom:20px;color:#222;text-align:center}
  .section{margin:16px 0}
  .section h2{font-size:16px;color:#333;margin-bottom:8px;padding-left:8px;border-left:4px solid #409eff}
  .section p{line-height:1.6;color:#555;padding:0 8px}
  .unlock-area{margin-bottom:20px;text-align:center}
  #pwd{padding:10px 12px;width:200px;border:1px solid #ddd;border-radius:8px;font-size:14px}
  #unlockBtn{padding:10px 16px;border:none;background:#409eff;color:#fff;border-radius:8px;cursor:pointer;margin-left:8px}
  #tip{margin-top:8px;font-size:13px}
  .content{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>皮肤管理 术前术后注意事项</h1>

  <!-- 密码解锁区域 -->
  <div class="unlock-area">
    <input type="password" id="pwd" placeholder="请输入密码">
    <button id="unlockBtn" onclick="unlock()">确认解锁</button>
    <div id="tip"></div>
  </div>

  <!-- 解锁后显示内容 -->
  <div class="content" id="content">
    <div class="section">
      <h2>术前注意事项</h2>
      <p>1. 治疗前2天避免过度清洁、去角质、刷酸等操作。</p>
      <p>2. 治疗前不使用刺激性护肤品，保持皮肤屏障健康。</p>
      <p>3. 如有过敏史、皮肤病史需提前告知操作师。</p>
      <p>4. 治疗当天素颜，不化妆、不涂抹厚重护肤品。</p>
    </div>

    <div class="section">
      <h2>术后注意事项</h2>
      <p>1. 术后72小时内以温和补水、修复为主，避免刺激。</p>
      <p>2. 一周内避免高温环境：桑拿、温泉、大量出汗运动。</p>
      <p>3. 严格防晒，优先物理防晒（帽子、口罩、伞）。</p>
      <p>4. 不自行挤压、抓挠，不使用功效型产品（酸类、美白、抗老）。</p>
      <p>5. 如出现持续红肿、刺痛、异常脱皮请及时联系。</p>
    </div>
  </div>
</div>

<script>
  // 在这里设置密码
  const PASSWORD = "skincare2026";

  function unlock() {
    const pwd = document.getElementById('pwd').value.trim();
    const tip = document.getElementById('tip');
    const content = document.getElementById('content');
    const unlockArea = document.querySelector('.unlock-area');

    if (pwd === PASSWORD) {
      tip.textContent = '解锁成功';
      tip.style.color = '#00b42a';
      content.style.display = 'block';
      unlockArea.style.display = 'none';
    } else {
      tip.textContent = '密码错误，请重试';
      tip.style.color = '#f53f3f';
    }
  }

  // 回车解锁
  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') unlock();
  });
</script>
</body>
</html>
