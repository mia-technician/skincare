<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aesthetic Notes · Admin Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.quilljs.com/2.0.3/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/2.0.3/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f0eb; font-family: 'Inter', sans-serif; color: #2a241f; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        .hero-section { background: white; border-radius: 28px; padding: 1.5rem 2rem; margin-bottom: 2rem; border: 1px solid #eee5df; }
        .hero-section h1 { font-size: 1.6rem; font-weight: 600; background: linear-gradient(135deg, #b47c56, #8f5e42); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .auth-container { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
        .auth-card { background: #fefaf7; border-radius: 60px; padding: 0.3rem 0.6rem; display: inline-flex; gap: 8px; align-items: center; border: 1px solid #f0e2d8; }
        .auth-input { padding: 6px 12px; border-radius: 40px; border: 1px solid #e2cfc2; font-size: 0.75rem; background: white; }
        .auth-btn { padding: 5px 14px; border-radius: 40px; background: #b47c56; color: white; border: none; cursor: pointer; }
        .workspace-layout { display: flex; gap: 1.8rem; min-height: 600px; }
        .sidebar { width: 320px; flex-shrink: 0; background: white; border-radius: 28px; border: 1px solid #eedfcb; overflow: hidden; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.2rem; border-bottom: 1px solid #f0e2d8; background: #fef7f2; }
        .sidebar-header h3 { font-size: 1rem; font-weight: 600; color: #4f3527; margin-bottom: 0.8rem; }
        .sidebar-search { width: 100%; padding: 0.6rem 1rem 0.6rem 2.3rem; border-radius: 40px; border: 1px solid #e2cfc2; font-size: 0.8rem; background: white; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #bc8a6b; font-size: 12px; }
        .notes-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
        .note-item { padding: 1rem 1.2rem; cursor: pointer; border-bottom: 1px solid #f3e8e1; transition: all 0.2s; }
        .note-item:hover { background: #fdf5f0; }
        .note-item.active { background: #f5e8e0; border-left: 3px solid #b47c56; }
        .note-item-title { font-weight: 600; color: #3d2a1f; margin-bottom: 0.25rem; font-size: 0.85rem; }
        .note-item-desc { font-size: 0.7rem; color: #b38b6e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .add-note-btn { margin: 1rem; background: #f7ede7; border: 1px dashed #c99a78; border-radius: 40px; padding: 0.7rem; text-align: center; cursor: pointer; color: #b47c56; font-weight: 500; transition: all 0.2s; }
        .add-note-btn:hover { background: #efe0d6; }
        .main-panel { flex: 1; background: white; border-radius: 28px; border: 1px solid #eedfcb; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { background: #fef7f2; padding: 1rem 1.8rem; border-bottom: 1px solid #f0e2d8; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .panel-header h2 { font-size: 1.2rem; font-weight: 600; color: #4f3527; }
        .edit-mode-btn, .save-note-btn { background: #f7ede7; border: none; font-size: 0.8rem; cursor: pointer; padding: 6px 18px; border-radius: 40px; color: #b47c56; font-weight: 500; }
        .save-note-btn { background: #b47c56; color: white; }
        .panel-body { flex: 1; padding: 1.8rem; overflow-y: auto; }
        .card-section { background: white; border-radius: 20px; border: 1px solid #f0e2d8; overflow: hidden; margin-bottom: 1.5rem; }
        .section-label { background: #faf3ef; padding: 0.6rem 1.2rem; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #ecdfd6; }
        .readonly-text { padding: 1.2rem 1.5rem; line-height: 1.6; font-size: 0.85rem; }
        .readonly-text ul { list-style-type: disc !important; padding-left: 1.8rem !important; }
        .readonly-text ol { list-style-type: decimal !important; padding-left: 1.8rem !important; }
        .readonly-text img { max-width: 300px; height: auto; border-radius: 8px; cursor: pointer; }
        .edit-input { width: 100%; padding: 0.7rem 1rem; border-radius: 40px; border: 1px solid #e2cfc2; font-size: 0.85rem; }
        .empty-state { text-align: center; padding: 3rem 1.5rem; color: #b38b6e; }
        #editQuillContainer { height: 300px; margin: 1rem; }
        #editQuillContainer img { max-width: 300px; height: auto; border-radius: 8px; cursor: pointer; }
        @media (max-width: 900px) { .workspace-layout { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-section">
        <div class="auth-container" id="authWidget">
            <div id="loginPanel" class="auth-card">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email" value="admin@example.com">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Password" value="admin123">
                <button id="loginBtn" class="auth-btn">Login</button>
            </div>
            <div id="userPanel" class="auth-card" style="display: none;">
                <span id="userEmailDisplay"></span>
                <button id="logoutBtn" class="auth-btn">Logout</button>
            </div>
        </div>
        <h1><i class="fas fa-spa"></i> Aesthetic Notes · Admin Workspace</h1>
        <p>Rich text editor with full formatting support | Cloud sync | Click image to view full size</p>
    </div>
    <div class="workspace-layout" id="workspaceLayout" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-sticky-note"></i> All Notes</h3>
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="noteSearchInput" class="sidebar-search" placeholder="Search by title or description...">
                </div>
            </div>
            <div id="notesListContainer" class="notes-list"></div>
            <div id="addNewNoteBtn" class="add-note-btn"><i class="fas fa-plus-circle"></i> Add New Note</div>
        </div>
        <div id="mainPanel" class="main-panel">
            <div class="panel-header">
                <h2 id="panelTitle">Aesthetic Workspace</h2>
                <div id="headerActions"></div>
            </div>
            <div id="panelBody" class="panel-body">
                <div class="empty-state">✨ Select a note from the left or create a new one.</div>
            </div>
        </div>
    </div>
</div>
<script>
    const SUPABASE_URL = 'https://dmrskyskryrdclknezth.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtcnNreXNrcnlyZGNsa25lenRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE2MzgsImV4cCI6MjA4OTk0NzYzOH0.Dnced4YAY24fE6kLxOe9YuR6Wrgt8pYcqKcjMFWDrY8';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null, projectsData = [], currentProject = null, quillEditor = null, currentFilter = '';

    async function fetchAllNotes() {
        if (!currentUser) return [];
        const { data, error } = await supabaseClient.from('treatment_notes').select('*').order('title', { ascending: true });
        if (error) { console.error(error); return []; }
        return data || [];
    }
    async function addNoteToSupabase(note) {
        const { data, error } = await supabaseClient.from('treatment_notes').insert([{ title: note.title, description: note.desc || '', note_text: note.noteText || '' }]).select();
        if (error) { console.error(error); return null; }
        return data?.[0] || null;
    }
    async function updateNoteInSupabase(id, updates) {
        if (!id || id === 'null') { console.error('Invalid id'); return null; }
        try {
            const { data, error } = await supabaseClient.from('treatment_notes').update({ title: updates.title, description: updates.desc, note_text: updates.noteText }).eq('id', id).select();
            if (error) { console.error('Update error:', error); return null; }
            return data?.[0] || null;
        } catch (err) { console.error(err); return null; }
    }
    async function adminLogin(email, password) {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (!error) currentUser = data.user;
        return { data, error };
    }
    async function adminLogout() { await supabaseClient.auth.signOut(); currentUser = null; }
    async function checkExistingSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            currentUser = session.user;
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('userPanel').style.display = 'flex';
            document.getElementById('userEmailDisplay').innerText = currentUser.email;
            document.getElementById('workspaceLayout').style.display = 'flex';
            await loadDataFromSupabase();
            return true;
        }
        return false;
    }
    async function loadDataFromSupabase() {
        if (!currentUser) return;
        let data = await fetchAllNotes();
        if (data.length === 0) {
            const defaultNote = { title: "Welcome Note", desc: "Getting started", noteText: "<h2>Welcome!</h2><ul><li>Write formatted text</li><li>Add images</li></ul>" };
            const inserted = await addNoteToSupabase(defaultNote);
            if (inserted) data = [inserted];
        }
        projectsData = data.map(item => ({ id: item.id, title: item.title || 'Untitled', desc: item.description || '', noteText: item.note_text || '' }));
        renderNotesList();
        if (projectsData.length > 0 && !currentProject) openProject(projectsData[0].id);
    }
    function renderNotesList() {
        const container = document.getElementById('notesListContainer');
        if (!container) return;
        let filtered = [...projectsData];
        if (currentFilter.trim()) { const q = currentFilter.toLowerCase(); filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)); }
        filtered.sort((a, b) => a.title.localeCompare(b.title));
        if (filtered.length === 0) { container.innerHTML = '<div style="padding:2rem;text-align:center;color:#b38b6e;">No notes found.</div>'; return; }
        container.innerHTML = filtered.map(note => `<div class="note-item ${currentProject?.id === note.id ? 'active' : ''}" data-id="${note.id}"><div class="note-item-title">${escapeHtml(note.title)}</div><div class="note-item-desc">${escapeHtml(note.desc?.substring(0,60)||'')}</div></div>`).join('');
        document.querySelectorAll('.note-item').forEach(el => { el.addEventListener('click', () => openProject(el.dataset.id)); });
    }
    function openProject(id) {
        currentProject = projectsData.find(p => p.id == id);
        if (currentProject) renderViewMode();
        renderNotesList();
    }
    function renderViewMode() {
        document.getElementById('panelTitle').innerHTML = `<i class="fas fa-clinic-medical"></i> ${escapeHtml(currentProject.title)}`;
        document.getElementById('headerActions').innerHTML = `<button id="enterEditBtn" class="edit-mode-btn"><i class="fas fa-pen"></i> Edit Note</button>`;
        const body = document.getElementById('panelBody');
        body.innerHTML = '';
        const textDiv = document.createElement('div'); textDiv.className = 'card-section';
        textDiv.innerHTML = `<div class="section-label">📝 Content</div><div class="readonly-text">${currentProject.noteText || '<em>No content</em>'}</div>`;
        body.appendChild(textDiv);
        document.getElementById('enterEditBtn')?.addEventListener('click', () => enterEditMode());
    }
    function enterEditMode() {
        document.getElementById('panelTitle').innerHTML = `<i class="fas fa-pen-fancy"></i> Editing · ${escapeHtml(currentProject.title)}`;
        document.getElementById('headerActions').innerHTML = `<button id="cancelEditBtn" class="edit-mode-btn">Cancel</button><button id="saveEditBtn" class="save-note-btn">Save to Cloud</button>`;
        const body = document.getElementById('panelBody');
        body.innerHTML = '';
        body.innerHTML += `<div class="card-section"><div class="section-label">✏️ Title</div><div style="padding:1rem"><input id="editTitleInput" class="edit-input" value="${escapeHtml(currentProject.title)}"></div></div>`;
        body.innerHTML += `<div class="card-section"><div class="section-label">📄 Description</div><div style="padding:1rem"><input id="editDescInput" class="edit-input" value="${escapeHtml(currentProject.desc)}"></div></div>`;
        const richDiv = document.createElement('div'); richDiv.className = 'card-section';
        richDiv.innerHTML = `<div class="section-label">✍️ Rich Text Editor</div><div id="editQuillContainer"></div>`;
        body.appendChild(richDiv);
        if (quillEditor) quillEditor = null;
        quillEditor = new Quill('#editQuillContainer', {
            theme: 'snow',
            modules: { toolbar: [[{ 'header': [1,2,3,4,5,6,false]}],['bold','italic','underline','strike'],[{ 'color': [] },{ 'background': [] }],[{ 'align': [] }],[{ 'list':'ordered'},{ 'list':'bullet'},{ 'list':'check'}],[{ 'indent': '-1'},{ 'indent': '+1'}],[{ 'script':'sub'},{ 'script':'super'}],['blockquote','code-block'],['link','image','video','clean']] }
        });
        quillEditor.setText('');
        quillEditor.clipboard.dangerouslyPasteHTML(currentProject.noteText || '');

        // 自定义图片上传：自动生成缩略图，点击查看原图
        const toolbar = quillEditor.getModule('toolbar');
        if (toolbar) {
            toolbar.addHandler('image', () => {
                const input = document.createElement('input');
                input.setAttribute('type', 'file');
                input.setAttribute('accept', 'image/*');
                input.onchange = () => {
                    const file = input.files[0];
                    if (file) {
                        const range = quillEditor.getSelection(true);
                        quillEditor.insertText(range.index, '⏳ Uploading...', 'user');
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                // 生成缩略图
                                const canvas = document.createElement('canvas');
                                const maxWidth = 300;
                                let width = img.width;
                                let height = img.height;
                                if (width > maxWidth) {
                                    height = (height * maxWidth) / width;
                                    width = maxWidth;
                                }
                                canvas.width = width;
                                canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                const thumbDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                                const originalDataUrl = e.target.result;
                                quillEditor.deleteText(range.index, '⏳ Uploading...'.length);
                                const imgHtml = `<a href="${originalDataUrl}" target="_blank"><img src="${thumbDataUrl}" style="max-width:300px; height:auto; border-radius:8px; cursor:pointer;" title="Click to view full size"></a>`;
                                quillEditor.clipboard.dangerouslyPasteHTML(range.index, imgHtml);
                            };
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });
        }

        document.getElementById('cancelEditBtn').onclick = () => renderViewMode();
        document.getElementById('saveEditBtn').onclick = async () => {
            const newTitle = document.getElementById('editTitleInput').value.trim() || 'Untitled';
            const newDesc = document.getElementById('editDescInput').value.trim() || '';
            let content = quillEditor.root.innerHTML;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            tempDiv.querySelectorAll('ol').forEach(ol => {
                const ul = document.createElement('ul');
                ul.innerHTML = ol.innerHTML;
                ol.parentNode.replaceChild(ul, ol);
            });
            tempDiv.querySelectorAll('li[data-list="bullet"]').forEach(li => {
                li.removeAttribute('data-list');
            });
            content = tempDiv.innerHTML;
            if (currentProject.id && currentProject.id !== 'null') {
                const updated = await updateNoteInSupabase(currentProject.id, { title: newTitle, desc: newDesc, noteText: content });
                if (updated) { alert('✓ Saved successfully'); await loadDataFromSupabase(); openProject(currentProject.id); } else alert('Save failed');
            } else {
                const inserted = await addNoteToSupabase({ title: newTitle, desc: newDesc, noteText: content });
                if (inserted) { alert('✓ Created successfully'); await loadDataFromSupabase(); openProject(inserted.id); } else alert('Creation failed');
            }
        };
    }
    function openCreateMode() { currentProject = { id: null, title: 'New Note', desc: '', noteText: '' }; enterEditMode(); }
    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }
    document.getElementById('loginBtn').onclick = async () => {
        const { error } = await adminLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        if (error) alert('Login failed: ' + error.message);
        else { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('userPanel').style.display = 'flex'; document.getElementById('userEmailDisplay').innerText = currentUser.email; document.getElementById('workspaceLayout').style.display = 'flex'; await loadDataFromSupabase(); }
    };
    document.getElementById('logoutBtn').onclick = async () => { await adminLogout(); document.getElementById('loginPanel').style.display = 'flex'; document.getElementById('userPanel').style.display = 'none'; document.getElementById('workspaceLayout').style.display = 'none'; document.getElementById('panelBody').innerHTML = '<div class="empty-state">✨ Please login to access your notes.</div>'; };
    document.getElementById('noteSearchInput')?.addEventListener('input', (e) => { currentFilter = e.target.value; renderNotesList(); });
    document.getElementById('addNewNoteBtn')?.addEventListener('click', openCreateMode);
    checkExistingSession().then(has => { if(!has) { document.getElementById('workspaceLayout').style.display = 'none'; document.getElementById('panelBody').innerHTML = '<div class="empty-state">✨ Please login to access your notes.</div>'; } });
</script>
</body>
</html>
