<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aesthetic Notes · Admin Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.quilljs.com/2.0.3/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/2.0.3/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f0eb; font-family: 'Inter', sans-serif; color: #2a241f; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* Hero Section */
        .hero-section { background: white; border-radius: 28px; padding: 1.5rem 2rem; margin-bottom: 2rem; border: 1px solid #eee5df; }
        .hero-section h1 { font-size: 1.6rem; font-weight: 600; background: linear-gradient(135deg, #b47c56, #8f5e42); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .auth-container { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
        .auth-card { background: #fefaf7; border-radius: 60px; padding: 0.3rem 0.6rem; display: inline-flex; gap: 8px; align-items: center; border: 1px solid #f0e2d8; }
        .auth-input { padding: 6px 12px; border-radius: 40px; border: 1px solid #e2cfc2; font-size: 0.75rem; background: white; }
        .auth-btn { padding: 5px 14px; border-radius: 40px; background: #b47c56; color: white; border: none; cursor: pointer; }
        
        /* Two-column layout */
        .workspace-layout { display: flex; gap: 1.8rem; min-height: 600px; }
        .sidebar { width: 320px; flex-shrink: 0; background: white; border-radius: 28px; border: 1px solid #eedfcb; overflow: hidden; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.2rem; border-bottom: 1px solid #f0e2d8; background: #fef7f2; }
        .sidebar-header h3 { font-size: 1rem; font-weight: 600; color: #4f3527; margin-bottom: 0.8rem; }
        .sidebar-search { width: 100%; padding: 0.6rem 1rem 0.6rem 2.3rem; border-radius: 40px; border: 1px solid #e2cfc2; font-size: 0.8rem; background: white; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #bc8a6b; font-size: 12px; }
        .notes-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
        .note-item { padding: 1rem 1.2rem; cursor: pointer; border-bottom: 1px solid #f3e8e1; transition: all 0.2s; }
        .note-item:hover { background: #fdf5f0; }
        .note-item.active { background: #f5e8e0; border-left: 3px solid #b47c56; }
        .note-item-title { font-weight: 600; color: #3d2a1f; margin-bottom: 0.25rem; font-size: 0.85rem; }
        .note-item-desc { font-size: 0.7rem; color: #b38b6e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .add-note-btn { margin: 1rem; background: #f7ede7; border: 1px dashed #c99a78; border-radius: 40px; padding: 0.7rem; text-align: center; cursor: pointer; color: #b47c56; font-weight: 500; transition: all 0.2s; }
        .add-note-btn:hover { background: #efe0d6; }
        
        .main-panel { flex: 1; background: white; border-radius: 28px; border: 1px solid #eedfcb; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { background: #fef7f2; padding: 1rem 1.8rem; border-bottom: 1px solid #f0e2d8; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .panel-header h2 { font-size: 1.2rem; font-weight: 600; color: #4f3527; }
        .edit-mode-btn, .save-note-btn { background: #f7ede7; border: none; font-size: 0.8rem; cursor: pointer; padding: 6px 18px; border-radius: 40px; color: #b47c56; font-weight: 500; }
        .save-note-btn { background: #b47c56; color: white; }
        .panel-body { flex: 1; padding: 1.8rem; overflow-y: auto; }
        .card-section { background: white; border-radius: 20px; border: 1px solid #f0e2d8; overflow: hidden; margin-bottom: 1.5rem; }
        .section-label { background: #faf3ef; padding: 0.6rem 1.2rem; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #ecdfd6; }
        .readonly-text { padding: 1.2rem 1.5rem; line-height: 1.6; font-size: 0.85rem; }
        .readonly-text ul, .readonly-text ol { padding-left: 2rem; margin: 0.5rem 0; }
        /* 确保所有列表样式正确显示 */
.readonly-text ul,
.readonly-text ol {
    padding-left: 1.8rem;
    margin: 0.5rem 0;
}

.readonly-text ul {
    list-style-type: disc !important;
}

.readonly-text ul ul {
    list-style-type: circle !important;
}

.readonly-text ul ul ul {
    list-style-type: square !important;
}

.readonly-text ol {
    list-style-type: decimal !important;
}

.readonly-text ol ol {
    list-style-type: lower-alpha !important;
}

.readonly-text li {
    margin-bottom: 0.25rem;
    display: list-item;
}

/* 修复 Quill 可能产生的特殊列表 */
.readonly-text li[data-list="bullet"],
.readonly-text li[data-list="checked"],
.readonly-text li[data-list="unchecked"] {
    list-style-type: disc !important;
}
        .media-grid { display: flex; flex-wrap: wrap; gap: 1rem; padding: 1.2rem; }
        .media-item { position: relative; width: 120px; cursor: pointer; }
        .media-item img, .media-item .video-thumb { width: 120px; height: 120px; object-fit: cover; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .delete-media { position: absolute; top: -8px; right: -8px; background: #d9534f; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: none; }
        .add-btn { background: #f7ede7; border: 1px dashed #c99a78; border-radius: 16px; width: 120px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: #b47c56; }
        .edit-input { width: 100%; padding: 0.7rem 1rem; border-radius: 40px; border: 1px solid #e2cfc2; font-size: 0.85rem; }
        .empty-state { text-align: center; padding: 3rem 1.5rem; color: #b38b6e; }
        .media-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; }
        .media-modal.show { display: flex; }
        .media-modal img, .media-modal iframe { max-width: 90%; max-height: 90%; border-radius: 12px; background: black; }
        .modal-close { position: absolute; top: 24px; right: 32px; color: white; font-size: 40px; cursor: pointer; }
        .youtube-container { position: relative; width: 100%; max-width: 800px; }
        .youtube-container iframe { width: 100%; height: 450px; border-radius: 12px; }
        @media (max-width: 900px) { .workspace-layout { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-section">
        <div class="auth-container" id="authWidget">
            <div id="loginPanel" class="auth-card">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email" value="admin@example.com">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Password" value="admin123">
                <button id="loginBtn" class="auth-btn">Login</button>
            </div>
            <div id="userPanel" class="auth-card" style="display: none;">
                <span id="userEmailDisplay"></span>
                <button id="logoutBtn" class="auth-btn">Logout</button>
            </div>
        </div>
        <h1><i class="fas fa-spa"></i> Aesthetic Notes · Admin Workspace</h1>
        <p>Multi‑image & video gallery | Cloud sync | YouTube support only</p>
    </div>
    
    <div class="workspace-layout" id="workspaceLayout" style="display: none;">
        <!-- Left Sidebar: Notes List -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-sticky-note"></i> All Notes</h3>
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="noteSearchInput" class="sidebar-search" placeholder="Search by title or description...">
                </div>
            </div>
            <div id="notesListContainer" class="notes-list">
                <!-- Dynamic note list will appear here -->
            </div>
            <div id="addNewNoteBtn" class="add-note-btn">
                <i class="fas fa-plus-circle"></i> Add New Note
            </div>
        </div>
        
        <!-- Right Main Panel -->
        <div id="mainPanel" class="main-panel">
            <div class="panel-header">
                <h2 id="panelTitle">Aesthetic Workspace</h2>
                <div id="headerActions"></div>
            </div>
            <div id="panelBody" class="panel-body">
                <div class="empty-state">✨ Select a note from the left or create a new one.</div>
            </div>
        </div>
    </div>
</div>

<div id="mediaModal" class="media-modal">
    <span class="modal-close">&times;</span>
    <img id="modalImage" style="display: none;">
    <div id="modalYoutube" class="youtube-container" style="display: none;"></div>
</div>

<script>
    // ==================== CONFIG ====================
    const SUPABASE_URL = 'https://dmrskyskryrdclknezth.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtcnNreXNrcnlyZGNsa25lenRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE2MzgsImV4cCI6MjA4OTk0NzYzOH0.Dnced4YAY24fE6kLxOe9YuR6Wrgt8pYcqKcjMFWDrY8';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const STORAGE_BUCKET = 'treatment-images';

    let currentUser = null;
    let projectsData = [];
    let currentProject = null;
    let quillEditor = null;
    let currentFilter = '';

    // Helper: Extract YouTube ID
    function getYouTubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // Upload image to Supabase Storage
    async function uploadImageToBucket(file, fileName) {
        const { data, error } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(`public/${fileName}`, file);
        if (error) throw error;
        const { data: urlData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(`public/${fileName}`);
        return urlData.publicUrl;
    }

    // CRUD
    async function fetchAllNotes() {
    if (!currentUser) return [];
    const { data, error } = await supabaseClient
        .from('treatment_notes')
        .select('*')
        .order('created_at', { ascending: false });  // 改用 created_at 排序
    if (error) { 
        console.error('Fetch error:', error); 
        return []; 
    }
    for (let item of data) {
        if (!item.images) item.images = [];
        if (!item.videos) item.videos = [];
        // 确保 note_text 不为空
        if (!item.note_text) item.note_text = '';
    }
    return data;
}

    async function addNoteToSupabase(note) {
        const { data, error } = await supabaseClient.from('treatment_notes').insert([{
            title: note.title, description: note.desc || '', note_text: note.noteText || '',
            images: note.images || [], videos: note.videos || []
        }]).select();
        if (error) { console.error(error); return null; }
        return data[0];
    }

    async function updateNoteInSupabase(id, updates) {
    // 更严格的 ID 验证
    if (!id || id === 'null' || id === 'undefined' || typeof id !== 'string') {
        console.error('Invalid id for update:', id);
        return null;
    }
    
    // 验证 UUID 格式（8-4-4-4-12）
    const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    if (!uuidRegex.test(id)) {
        console.error('Invalid UUID format:', id);
        return null;
    }
    
    try {
        const { data, error } = await supabaseClient.from('treatment_notes').update({
    title: updates.title, 
    description: updates.desc, 
    note_text: updates.noteText,
    images: updates.images, 
    videos: updates.videos
    // 删除 updated_at: new Date()
}).eq('id', id).select();
        
        if (error) {
            console.error('Update error:', error);
            return null;
        }
        return data?.[0] || null;
    } catch (err) {
        console.error('Update exception:', err);
        return null;
    }
}

    // Auth
    async function adminLogin(email, password) {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (!error) currentUser = data.user;
        return { data, error };
    }
    async function adminLogout() { await supabaseClient.auth.signOut(); currentUser = null; }
    async function checkExistingSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            currentUser = session.user;
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('userPanel').style.display = 'flex';
            document.getElementById('userEmailDisplay').innerText = currentUser.email;
            document.getElementById('workspaceLayout').style.display = 'flex';
            await loadDataFromSupabase();
            return true;
        }
        return false;
    }

    async function loadDataFromSupabase() {
        if (!currentUser) return;
        let data = await fetchAllNotes();
        if (data.length === 0) {
            const defaultNote = {
                title: "IPL Photofacial", desc: "Reduces redness, pores", noteText: "<p><strong>IPL Notes</strong>: 30min session.</p>",
                images: [{ url: "https://picsum.photos/id/20/800/600", thumb: "https://picsum.photos/id/20/400/300" }],
                videos: []
            };
            const inserted = await addNoteToSupabase(defaultNote);
            if (inserted) data = [inserted];
        }
        projectsData = data.map(item => ({
            id: item.id, title: item.title || 'Untitled', desc: item.description || '',
            noteText: item.note_text || '', images: item.images || [], videos: item.videos || []
        }));
        renderNotesList();
        if (projectsData.length > 0 && !currentProject) openProject(projectsData[0].id);
    }

    // Render sidebar list with sorting and filtering
    function renderNotesList() {
        const container = document.getElementById('notesListContainer');
        if (!container) return;
        
        let filtered = [...projectsData];
        if (currentFilter.trim()) {
            const query = currentFilter.toLowerCase();
            filtered = filtered.filter(p => p.title.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
        }
        
        // Sort by title A-Z (alphabetical)
        filtered.sort((a, b) => a.title.localeCompare(b.title));
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding: 2rem; text-align: center; color: #b38b6e;">No notes found.</div>';
            return;
        }
        
        container.innerHTML = filtered.map(note => `
            <div class="note-item ${currentProject?.id === note.id ? 'active' : ''}" data-id="${note.id}">
                <div class="note-item-title">${escapeHtml(note.title)}</div>
                <div class="note-item-desc">${escapeHtml(note.desc?.substring(0, 60) || '')}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.note-item').forEach(el => {
            el.addEventListener('click', () => openProject(el.dataset.id));
        });
    }

    function openProject(id) {
        currentProject = projectsData.find(p => p.id == id);
        if (currentProject) renderViewMode();
        renderNotesList(); // refresh active highlight
    }

    function renderViewMode() {
        document.getElementById('panelTitle').innerHTML = `<i class="fas fa-clinic-medical"></i> ${escapeHtml(currentProject.title)}`;
        document.getElementById('headerActions').innerHTML = `<button id="enterEditBtn" class="edit-mode-btn"><i class="fas fa-pen"></i> Edit Note</button>`;
        const body = document.getElementById('panelBody');
        body.innerHTML = '';
        
        // Rich text content
        const textDiv = document.createElement('div'); textDiv.className = 'card-section';
        textDiv.innerHTML = `<div class="section-label">📝 Text Notes</div><div class="readonly-text">${currentProject.noteText || '<em>No content</em>'}</div>`;
        body.appendChild(textDiv);
        
        // Images
        if (currentProject.images && currentProject.images.length) {
            const imgDiv = document.createElement('div'); imgDiv.className = 'card-section';
            imgDiv.innerHTML = `<div class="section-label">🖼️ Images (${currentProject.images.length})</div><div class="media-grid" id="viewImagesGrid"></div>`;
            body.appendChild(imgDiv);
            const grid = imgDiv.querySelector('#viewImagesGrid');
            currentProject.images.forEach(img => {
                const item = document.createElement('div'); item.className = 'media-item';
                item.innerHTML = `<img src="${img.thumb || img.url}" onclick="openImageModal('${img.url}')">`;
                grid.appendChild(item);
            });
        }
        
        // YouTube Videos
        if (currentProject.videos && currentProject.videos.length) {
            const vidDiv = document.createElement('div'); vidDiv.className = 'card-section';
            vidDiv.innerHTML = `<div class="section-label">🎬 YouTube Videos (${currentProject.videos.length})</div><div class="media-grid" id="viewVideosGrid"></div>`;
            body.appendChild(vidDiv);
            const grid = vidDiv.querySelector('#viewVideosGrid');
            currentProject.videos.forEach(vid => {
                const youtubeId = getYouTubeId(vid.url);
                if (youtubeId) {
                    const item = document.createElement('div'); item.className = 'media-item';
                    item.innerHTML = `<div><img src="https://img.youtube.com/vi/${youtubeId}/mqdefault.jpg" style="width:120px;height:120px;object-fit:cover;border-radius:16px;" onclick="openYoutubeModal('${youtubeId}')"><i class="fas fa-play-circle" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:white;"></i></div>`;
                    grid.appendChild(item);
                }
            });
        }
        
        document.getElementById('enterEditBtn')?.addEventListener('click', () => enterEditMode());
    }

    function enterEditMode() {
        document.getElementById('panelTitle').innerHTML = `<i class="fas fa-pen-fancy"></i> Editing · ${escapeHtml(currentProject.title)}`;
        document.getElementById('headerActions').innerHTML = `<button id="cancelEditBtn" class="edit-mode-btn">Cancel</button><button id="saveEditBtn" class="save-note-btn">Save to Cloud</button>`;
        const body = document.getElementById('panelBody');
        body.innerHTML = '';
        
        body.innerHTML += `<div class="card-section"><div class="section-label">✏️ Title</div><div style="padding:1rem"><input id="editTitleInput" class="edit-input" value="${escapeHtml(currentProject.title)}"></div></div>`;
        body.innerHTML += `<div class="card-section"><div class="section-label">📄 Description</div><div style="padding:1rem"><input id="editDescInput" class="edit-input" value="${escapeHtml(currentProject.desc)}"></div></div>`;
        
        const richDiv = document.createElement('div'); richDiv.className = 'card-section';
        richDiv.innerHTML = `<div class="section-label">✍️ Rich Text</div><div id="editQuillContainer" style="height:200px;"></div>`;
        body.appendChild(richDiv);
        
        const imgEditDiv = document.createElement('div'); imgEditDiv.className = 'card-section';
        imgEditDiv.innerHTML = `<div class="section-label">🖼️ Images</div><div id="editImagesGrid" class="media-grid" style="padding:1rem"></div><div style="padding:0 1rem 1rem 1rem"><input type="file" id="newImageInput" accept="image/*" style="display:none"><button id="addImageBtn" class="edit-mode-btn"><i class="fas fa-plus"></i> Add Image</button></div>`;
        body.appendChild(imgEditDiv);
        
        const vidEditDiv = document.createElement('div'); vidEditDiv.className = 'card-section';
        vidEditDiv.innerHTML = `<div class="section-label">🎬 YouTube Videos (URL only)</div><div id="editVideosGrid" class="media-grid" style="padding:1rem"></div><div style="padding:0 1rem 1rem 1rem;display:flex;gap:8px;"><input type="text" id="newVideoUrl" placeholder="YouTube URL (e.g., https://youtu.be/... or https://youtube.com/watch?v=...)" style="flex:1" class="edit-input"><button id="addVideoBtn" class="edit-mode-btn"><i class="fas fa-plus"></i> Add</button></div>`;
        body.appendChild(vidEditDiv);

        if (quillEditor) quillEditor = null;
        quillEditor = new Quill('#editQuillContainer', {
    theme: 'snow',
    modules: {
        toolbar: [
            [{ 'header': [1, 2, 3, 4, 5, 6, false] }],  // 标题级别
            ['bold', 'italic', 'underline', 'strike'],   // 粗体、斜体、下划线、删除线
            [{ 'color': [] }, { 'background': [] }],     // 文字颜色、背景色
            [{ 'align': [] }],                           // 对齐方式
            [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'list': 'check' }], // 有序列表、无序列表、待办清单
            [{ 'indent': '-1'}, { 'indent': '+1' }],     // 缩进
            [{ 'script': 'sub'}, { 'script': 'super' }], // 下标、上标
            ['blockquote', 'code-block'],                // 引用块、代码块
            ['link', 'image', 'video'],                  // 链接、图片、视频
            ['clean']                                    // 清除格式
        ]
    }
});
        quillEditor.setText('');
        quillEditor.clipboard.dangerouslyPasteHTML(currentProject.noteText || '');

        let currentImages = [...(currentProject.images || [])];
        let currentVideos = [...(currentProject.videos || [])];

        function renderEditImages() {
            const grid = document.getElementById('editImagesGrid');
            if (!grid) return;
            grid.innerHTML = '';
            currentImages.forEach((img, idx) => {
                const div = document.createElement('div'); div.className = 'media-item';
                div.innerHTML = `<img src="${img.thumb || img.url}" style="width:120px;height:120px;"><button class="delete-media" data-idx="${idx}"><i class="fas fa-times"></i></button>`;
                div.querySelector('.delete-media').onclick = (e) => { e.stopPropagation(); currentImages.splice(idx,1); renderEditImages(); };
                grid.appendChild(div);
            });
            const addBox = document.createElement('div'); addBox.className = 'add-btn'; addBox.innerHTML = '<i class="fas fa-plus fa-2x"></i><span>Add Image</span>';
            addBox.onclick = () => document.getElementById('newImageInput').click();
            grid.appendChild(addBox);
        }
        
        function renderEditVideos() {
            const grid = document.getElementById('editVideosGrid');
            if (!grid) return;
            grid.innerHTML = '';
            currentVideos.forEach((vid, idx) => {
                const youtubeId = getYouTubeId(vid.url);
                const thumb = youtubeId ? `https://img.youtube.com/vi/${youtubeId}/mqdefault.jpg` : 'https://placehold.co/400x300/eee/aaa?text=Invalid+URL';
                const div = document.createElement('div'); div.className = 'media-item';
                div.innerHTML = `<div style="position:relative;"><img src="${thumb}" style="width:120px;height:120px;object-fit:cover;border-radius:16px;"><button class="delete-media" data-idx="${idx}"><i class="fas fa-times"></i></button></div>`;
                div.querySelector('.delete-media').onclick = (e) => { e.stopPropagation(); currentVideos.splice(idx,1); renderEditVideos(); };
                grid.appendChild(div);
            });
        }
        
        renderEditImages();
        renderEditVideos();

        const fileInput = document.getElementById('newImageInput');
        document.getElementById('addImageBtn')?.addEventListener('click', () => fileInput.click());
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 6)}.${ext}`;
            try {
                const url = await uploadImageToBucket(file, fileName);
                currentImages.push({ url: url, thumb: url });
                renderEditImages();
            } catch (err) { alert('Upload failed: ' + err.message); }
            fileInput.value = '';
        };
        
        document.getElementById('addVideoBtn')?.addEventListener('click', () => {
            let url = document.getElementById('newVideoUrl').value.trim();
            if (!url) return;
            const youtubeId = getYouTubeId(url);
            if (!youtubeId) { alert('Invalid YouTube URL. Please enter a valid YouTube link (youtu.be/... or youtube.com/watch?v=...)'); return; }
            currentVideos.push({ url: url, thumb: `https://img.youtube.com/vi/${youtubeId}/mqdefault.jpg` });
            renderEditVideos();
            document.getElementById('newVideoUrl').value = '';
        });

        document.getElementById('cancelEditBtn').onclick = () => renderViewMode();
        document.getElementById('saveEditBtn').onclick = async () => {
            const newTitle = document.getElementById('editTitleInput').value.trim() || 'Untitled';
            const newDesc = document.getElementById('editDescInput').value.trim() || '';
            const newNote = quillEditor.root.innerHTML;
            
            if (currentProject.id && currentProject.id !== 'null') {
                const updated = await updateNoteInSupabase(currentProject.id, {
                    title: newTitle, desc: newDesc, noteText: newNote,
                    images: currentImages, videos: currentVideos
                });
                if (updated) { 
                    alert('✓ Saved successfully');
                    await loadDataFromSupabase();
                    openProject(currentProject.id);
                } else alert('Save failed');
            } else {
                const inserted = await addNoteToSupabase({
                    title: newTitle, desc: newDesc, noteText: newNote,
                    images: currentImages, videos: currentVideos
                });
                if (inserted) { 
                    alert('✓ Created successfully');
                    await loadDataFromSupabase();
                    openProject(inserted.id);
                } else alert('Creation failed');
            }
        };
    }

    function openCreateMode() {
        currentProject = { id: null, title: 'New Treatment', desc: '', noteText: '', images: [], videos: [] };
        enterEditMode();
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }

    // Modals
    const modal = document.getElementById('mediaModal'), modalImg = document.getElementById('modalImage'), modalYoutube = document.getElementById('modalYoutube');
    window.openImageModal = (url) => { 
        modalImg.style.display = 'block'; 
        modalYoutube.style.display = 'none'; 
        modalYoutube.innerHTML = '';
        modalImg.src = url; 
        modal.classList.add('show'); 
    };
    window.openYoutubeModal = (youtubeId) => {
        modalImg.style.display = 'none';
        modalYoutube.style.display = 'block';
        modalYoutube.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${youtubeId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        modal.classList.add('show');
    };
    document.querySelector('.modal-close').onclick = () => { modal.classList.remove('show'); modalYoutube.innerHTML = ''; modalVideo?.pause?.(); };
    modal.onclick = (e) => { if(e.target === modal) { modal.classList.remove('show'); modalYoutube.innerHTML = ''; } };

    // Event listeners
    document.getElementById('loginBtn').onclick = async () => {
        const { error } = await adminLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        if (error) alert('Login failed: ' + error.message);
        else { 
            document.getElementById('loginPanel').style.display = 'none'; 
            document.getElementById('userPanel').style.display = 'flex'; 
            document.getElementById('userEmailDisplay').innerText = currentUser.email;
            document.getElementById('workspaceLayout').style.display = 'flex';
            await loadDataFromSupabase(); 
        }
    };
    document.getElementById('logoutBtn').onclick = async () => { 
        await adminLogout(); 
        document.getElementById('loginPanel').style.display = 'flex'; 
        document.getElementById('userPanel').style.display = 'none'; 
        document.getElementById('workspaceLayout').style.display = 'none';
        document.getElementById('panelBody').innerHTML = '<div class="empty-state">✨ Please login to access your notes.</div>';
    };
    
    document.getElementById('noteSearchInput')?.addEventListener('input', (e) => {
        currentFilter = e.target.value;
        renderNotesList();
    });
    document.getElementById('addNewNoteBtn')?.addEventListener('click', openCreateMode);
    
    checkExistingSession().then(has => { 
        if(!has) {
            document.getElementById('workspaceLayout').style.display = 'none';
            document.getElementById('panelBody').innerHTML = '<div class="empty-state">✨ Please login to access your notes.</div>';
        }
    });
</script>
</body>
</html>
