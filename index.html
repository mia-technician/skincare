<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincare Routine Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <!-- 👇 引入共享的 supabase.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <!-- 👆 引入共享的 supabase.js -->

    <style>
        /* 你的原始样式，完全不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5efe9; font-family: 'Inter', sans-serif; padding: 1rem; }
        .app { max-width: 1200px; margin: 0 auto; background: #faf7f2; border-radius: 24px; padding: 2rem; }
        h1 { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 1.8rem; color: #7f6e5d; text-align: center; margin-bottom: 1.5rem; }
        .auth-section { text-align: center; margin-bottom: 1rem; }
        .auth-btn { padding: 0.5rem 1rem; background: #b99f87; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .routine-selector { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; }
        .routine-btn { padding: 0.5rem 1rem; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; }
        .routine-btn.active { background: #b99f87; color: white; }
        .product-library { background: #fff9f2; border-radius: 16px; padding: 1rem; margin-bottom: 1rem; }
        .brand-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .brand-tag { padding: 0.3rem 0.8rem; border-radius: 20px; background: #e9dfd4; cursor: pointer; font-size: 0.8rem; }
        .brand-tag.active { background: #b99f87; color: white; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .product-card { background: white; border-radius: 12px; padding: 0.8rem; cursor: move; border: 1px solid #e7dbd0; }
        .product-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-bottom: 0.5rem; }
        .product-name { font-size: 0.9rem; font-weight: 500; color: #333; }
        .product-brand { font-size: 0.7rem; color: #888; }
        .product-price { font-size: 0.8rem; font-weight: 600; color: #b99f87; }
        .routine-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .routine-column { background: #fff9f2; border-radius: 16px; padding: 1rem; }
        .routine-title { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 1.2rem; color: #7f6e5d; margin-bottom: 1rem; }
        .routine-slot { min-height: 80px; border: 2px dashed #ddd; border-radius: 8px; padding: 0.5rem; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #888; }
        .routine-item { background: white; border-radius: 8px; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #e7dbd0; }
        .routine-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; margin-right: 0.5rem; }
        .stats-section { text-align: center; margin: 1rem 0; }
        .stats-value { font-size: 1.5rem; font-weight: 600; color: #b99f87; }
        .action-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; }
        .action-btn { padding: 0.5rem 1.5rem; border: none; border-radius: 20px; cursor: pointer; font-weight: 500; }
        .action-btn-primary { background: #b99f87; color: white; }
        .action-btn-secondary { background: #e9dfd4; color: #333; }
        .hidden { display: none; }
        @media (max-width: 750px) { .routine-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app">
        <h1>Skincare Routine Builder</h1>
        
        <!-- Authentication Section -->
        <div class="auth-section">
            <button id="authBtn" class="auth-btn">Sign in with Google</button>
        </div>

        <!-- Routine Selector -->
        <div class="routine-selector">
            <button class="routine-btn active" data-routine="morning">Morning</button>
            <button class="routine-btn" data-routine="night">Night</button>
        </div>

        <!-- Product Library -->
        <div class="product-library">
            <h3>Product Library</h3>
            <div class="brand-tags">
                <span class="brand-tag active" data-brand="all">All Brands</span>
                <span class="brand-tag" data-brand="SkinMedica">SkinMedica</span>
                <span class="brand-tag" data-brand="Skinceuticals">Skinceuticals</span>
                <span class="brand-tag" data-brand="FNL">FNL</span>
                <span class="brand-tag" data-brand="Obagi">Obagi</span>
                <span class="brand-tag" data-brand="Alastin">Alastin</span>
            </div>
            <div class="product-grid" id="productGrid">
                <!-- Products will be loaded here -->
            </div>
        </div>

        <!-- Routine Builder -->
        <div class="routine-container">
            <div class="routine-column">
                <h3 class="routine-title">AM Routine</h3>
                <div id="amRoutine" class="routine-dropzone">
                    <div class="routine-slot">Drag products here</div>
                </div>
            </div>
            <div class="routine-column">
                <h3 class="routine-title">PM Routine</h3>
                <div id="pmRoutine" class="routine-dropzone">
                    <div class="routine-slot">Drag products here</div>
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-section">
            <p>Total Unique Products</p>
            <p class="stats-value" id="totalProducts">0</p>
            <p>Total Price</p>
            <p class="stats-value" id="totalPrice">$0</p>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-btn action-btn-primary" id="saveBtn">Save Routine</button>
            <button class="action-btn action-btn-secondary" id="printBtn">Print Routine</button>
            <button class="action-btn action-btn-secondary" id="syncBtn" class="hidden">Sync to Cloud</button>
        </div>
    </div>

    <script>
        // 👇 注释掉原来独立创建的 supabase 实例
        // const supabase = supabase.createClient(
        //     "https://dmrskyskryrdclknezth.supabase.co",
        //     "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtcnNreXNrcnlyZGNsa25lenRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE2MzgsImV4cCI6MjA4OTk0NzYzOH0.Dnced4YAY24fE6kLxOe9YuR6Wrgt8pYcqKcjMFWDrY8"
        // );

        // 现在直接使用全局的 supabase 实例

        // Default product data
        const products = [
            { id: 1, name: "Cleanser", brand: "SkinMedica", price: 35, image: "https://via.placeholder.com/150", description: "Gentle cleanser" },
            { id: 2, name: "Vitamin C", brand: "Skinceuticals", price: 166, image: "https://via.placeholder.com/150", description: "Antioxidant serum" },
            { id: 3, name: "Brightening Cream", brand: "FNL", price: 89, image: "https://via.placeholder.com/150", description: "Brightening moisturizer" },
            { id: 4, name: "SPF 50", brand: "Obagi", price: 42, image: "https://via.placeholder.com/150", description: "Sunscreen" },
            { id: 5, name: "Retinol", brand: "SkinMedica", price: 128, image: "https://via.placeholder.com/150", description: "Anti-aging treatment" },
            { id: 6, name: "Hydrating Serum", brand: "Alastin", price: 75, image: "https://via.placeholder.com/150", description: "Hydrating serum" },
            { id: 7, name: "Eye Cream", brand: "Skinceuticals", price: 98, image: "https://via.placeholder.com/150", description: "Eye treatment" },
            { id: 8, name: "Moisturizer", brand: "FNL", price: 65, image: "https://via.placeholder.com/150", description: "Daily moisturizer" },
            { id: 9, name: "Exfoliator", brand: "Obagi", price: 55, image: "https://via.placeholder.com/150", description: "Exfoliating treatment" }
        ];

        // Authentication
        const authBtn = document.getElementById('authBtn');
        const syncBtn = document.getElementById('syncBtn');

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                authBtn.textContent = 'Sign out';
                syncBtn.classList.remove('hidden');
            } else {
                authBtn.textContent = 'Sign in with Google';
                syncBtn.classList.add('hidden');
            }
        });

        authBtn.addEventListener('click', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                await supabase.auth.signOut();
            } else {
                await supabase.auth.signInWithOAuth({ provider: 'google' });
            }
        });

        // Product library
        const productGrid = document.getElementById('productGrid');
        const brandTags = document.querySelectorAll('.brand-tag');

        function renderProducts(filterBrand = 'all') {
            productGrid.innerHTML = '';
            const filteredProducts = filterBrand === 'all' ? products : products.filter(p => p.brand === filterBrand);
            
            filteredProducts.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.draggable = true;
                productCard.dataset.productId = product.id;
                productCard.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <div class="product-name">${product.name}</div>
                    <div class="product-brand">${product.brand}</div>
                    <div class="product-price">$${product.price}</div>
                `;
                productGrid.appendChild(productCard);
            });
        }

        brandTags.forEach(tag => {
            tag.addEventListener('click', () => {
                brandTags.forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                renderProducts(tag.dataset.brand);
            });
        });

        // Routine builder
        const amRoutine = document.getElementById('amRoutine');
        const pmRoutine = document.getElementById('pmRoutine');

        // Drag and drop functionality
        // (This is a simplified version - full implementation would include dragstart, dragover, drop, dragend)
        document.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('product-card')) {
                e.dataTransfer.setData('productId', e.target.dataset.productId);
            }
        });

        [amRoutine, pmRoutine].forEach(dropzone => {
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.target.classList.add('drag-over');
            });

            dropzone.addEventListener('dragleave', (e) => {
                e.target.classList.remove('drag-over');
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                e.target.classList.remove('drag-over');
                const productId = e.dataTransfer.getData('productId');
                const product = products.find(p => p.id === parseInt(productId));
                
                if (product) {
                    const routineItem = document.createElement('div');
                    routineItem.className = 'routine-item';
                    routineItem.innerHTML = `
                        <img src="${product.image}" alt="${product.name}">
                        <div>
                            <div>${product.name}</div>
                            <div style="font-size: 0.7rem; color: #888;">${product.brand}</div>
                        </div>
                    `;
                    e.target.appendChild(routineItem);
                    updateStats();
                }
            });
        });

        // Update statistics
        function updateStats() {
            const allItems = document.querySelectorAll('.routine-item');
            const uniqueProducts = new Set();
            
            allItems.forEach(item => {
                // This would need to be implemented with actual product tracking
                uniqueProducts.add(item.textContent.trim());
            });

            document.getElementById('totalProducts').textContent = uniqueProducts.size;
            // Price calculation would need to be implemented
            document.getElementById('totalPrice').textContent = '$0';
        }

        // Action buttons
        document.getElementById('saveBtn').addEventListener('click', () => {
            // Save to local storage
            localStorage.setItem('skincareRoutine', JSON.stringify({
                am: [], // Would need to implement actual data collection
                pm: []
            }));
            alert('Routine saved locally!');
        });

        document.getElementById('printBtn').addEventListener('click', () => {
            window.print();
        });

        document.getElementById('syncBtn').addEventListener('click', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                // Sync to cloud
                await supabase.from('routines').insert([{
                    user_id: user.id,
                    morning_routine: [], // Would need to implement actual data collection
                    night_routine: []
                }]);
                alert('Routine synced to cloud!');
            }
        });

        // Initial render
        renderProducts();
    </script>
</body>
</html>
