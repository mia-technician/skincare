<script>
// 等待 Supabase SDK 加载完成
function initApp() {
    if (typeof supabase === 'undefined') {
        console.error('Supabase SDK still not loaded, retrying...');
        setTimeout(initApp, 1000);
        return;
    }
    
    console.log('Supabase SDK loaded successfully');
    
    const SUPABASE_URL = "https://dmrskyskryrdclknezth.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtcnNreXNrcnlyZGNsa25lenRoaCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQyODI4ODAwLCJleHAiOjIwNTg0MDQ4MDB9.xxxxxxxxxxx";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.supabaseClient = supabaseClient;

    // ==================== 默认数据 ====================
    const DEFAULT_PRODUCTS = [
        { id: "cleanser", name: "Cleanser", brand: "SkinMedica", price: 46, benefit: "Cleans · Removes SPF", usage: "Pea size - add water - cleanse", image: "https://static.wixstatic.com/media/11a6e1_cd31f58211984ecabef518ed158ea4dc~mv2.webp" },
        { id: "tns", name: "TNS+ Serum", brand: "SkinMedica", price: 330, benefit: "Lifting · Anti-aging", usage: "1 pump - apply to face", image: "https://static.wixstatic.com/media/11a6e1_8eb00266d932471483652b5a40828272~mv2.jpg" },
        { id: "lytera", name: "Lytera", brand: "SkinMedica", price: 170, benefit: "Brightener", usage: "1 pump - apply", image: "https://static.wixstatic.com/media/11a6e1_daddf6362e3b4bb0871467d485dcc76b~mv2.jpg" },
        { id: "ha5", name: "HA5", brand: "SkinMedica", price: 196, benefit: "Hydrator", usage: "1 pump - apply", image: "https://static.wixstatic.com/media/11a6e1_20f2ce9ce07a4ccaa0b5d5c6631fc0dc~mv2.webp" },
        { id: "moisturizer", name: "Moisturizer", brand: "SkinMedica", price: 155, benefit: "Soothing", usage: "1 pump - apply", image: "https://static.wixstatic.com/media/11a6e1_0f0aeb5de10d4a7ca110e93adb057e80~mv2.webp" },
        { id: "spf50", name: "Sheer Physical SPF50", brand: "SkinMedica", price: 66, benefit: "Physical SPF", usage: "1 pump - last step", image: "https://static.wixstatic.com/media/11a6e1_d2faad5c91134e0589fb5538c8f76d86~mv2.webp" },
        { id: "clarify-cleanser", name: "Clarify Cleanser", brand: "FNL", price: 50, benefit: "Antibacterial", usage: "Pea size - cleanse", image: "https://static.wixstatic.com/media/11a6e1_964680bfdf1b4efa9039db6f52428325~mv2.webp" },
        { id: "exfoliating-pad", name: "Exfoliating Pad 10%", brand: "FNL", price: 88, benefit: "Minimizes blackheads", usage: "Wipe face gently", image: "https://static.wixstatic.com/media/11a6e1_c4491a22e89846ba84ef28f5820ff427~mv2.webp" },
        { id: "silymarin", name: "Silymarin", brand: "Skinceuticals", price: 220, benefit: "Antioxidant for acne", usage: "1 pump", image: "https://static.wixstatic.com/media/11a6e1_8868dfe199c3466dafa239c238115433~mv2.webp" },
        { id: "glycolic-lotion", name: "Glycolic Lotion 10%", brand: "FNL", price: 98, benefit: "Improves texture", usage: "Pea size - apply", image: "https://static.wixstatic.com/media/11a6e1_74ebb016820f45008058763526dfad76~mv2.webp" },
        { id: "exo-gf", name: "Exo-GF Serum", brand: "FNL", price: 275, benefit: "Regenerates", usage: "1 pump", image: "https://static.wixstatic.com/media/11a6e1_62da2e3f71ff44229d4e90fc5289cf18~mv2.jpg" },
        { id: "retinol-fnl", name: "Retinol", brand: "FNL", price: 115, benefit: "Cell turnover", usage: "Start 2x/week", image: "https://static.wixstatic.com/media/11a6e1_c1094fd984f449a6bdd6a96bf13623ac~mv2.webp" },
        { id: "retinol", name: "Retinol", brand: "Skinceuticals", price: 66, benefit: "Cell turnover", usage: "Start 2x/week", image: "https://static.wixstatic.com/media/11a6e1_4f3763842728442482947369cfee0b18~mv2.png" },
        { id: "spf-powder", name: "SPF Powder Brush", brand: "ColorScience", price: 93.90, benefit: "Easy reapply", usage: "Brush over face", image: "https://static.wixstatic.com/media/11a6e1_02ac891ebdc24945ad2bb305d9be5579~mv2.jpg" },
        { id: "lumivive-day", name: "Lumivive - Day", brand: "SkinMedica", price: 285, benefit: "Antioxidant", usage: "1 pump - face & neck", image: "https://static.wixstatic.com/media/11a6e1_b12de65e4f8d4240ab28bdeecda8f811~mv2.webp" },
        { id: "lumivive-night", name: "Lumivive - Night", brand: "SkinMedica", price: 285, benefit: "Night Repair", usage: "1 pump - apply", image: "https://static.wixstatic.com/media/11a6e1_b12de65e4f8d4240ab28bdeecda8f811~mv2.webp" }
    ];

    const DEFAULT_ROUTINES = {
        "fnl-acne": { name: "FNL Acne Management", morning: ["clarify-cleanser", "exfoliating-pad", "silymarin", "glycolic-lotion", "spf50", "spf-powder"], evening: ["clarify-cleanser", "exo-gf", "retinol-fnl", "glycolic-lotion"] },
        "sm-acne-pigment": { name: "SC - SM Acne & Pigment", morning: ["cleanser", "lytera", "ha5", "moisturizer", "spf50"], evening: ["cleanser", "lytera", "retinol", "ha5", "moisturizer"] },
        "fnl-pigmentation": { name: "SC - FNL Pigmentation", morning: ["clarify-cleanser", "lytera", "silymarin", "spf50"], evening: ["clarify-cleanser", "exo-gf", "lytera", "retinol-fnl"] }
    };

    let productsData = [], savedRoutines = {}, currentRoutineId = "fnl-acne", morningProducts = [], eveningProducts = [], currentBrand = "all";
    let isAuthenticated = false, currentUserId = null;

    function getProductById(id) { return productsData.find(p => p.id === id); }
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    function saveToLocalStorage() {
        localStorage.setItem('skincare_products', JSON.stringify(productsData));
        localStorage.setItem('skincare_routines', JSON.stringify(savedRoutines));
        localStorage.setItem('skincare_current', currentRoutineId);
    }

    function loadFromLocalStorage() {
        const savedProducts = localStorage.getItem('skincare_products');
        const savedRoutinesData = localStorage.getItem('skincare_routines');
        const savedCurrent = localStorage.getItem('skincare_current');
        if (savedProducts) productsData = JSON.parse(savedProducts);
        else productsData = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
        if (savedRoutinesData) savedRoutines = JSON.parse(savedRoutinesData);
        else savedRoutines = JSON.parse(JSON.stringify(DEFAULT_ROUTINES));
        if (savedCurrent && savedRoutines[savedCurrent]) currentRoutineId = savedCurrent;
        else currentRoutineId = Object.keys(savedRoutines)[0];
    }

    async function loadFromCloud() {
        if (!isAuthenticated) return false;
        try {
            const { data: products } = await supabaseClient.from('products').select('*');
            const { data: routines } = await supabaseClient.from('routines').select('*');
            if (products && products.length > 0) productsData = products;
            else { productsData = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS)); for (const p of productsData) await supabaseClient.from('products').insert({ ...p, user_id: currentUserId }); }
            if (routines && routines.length > 0) { savedRoutines = {}; routines.forEach(r => { savedRoutines[r.id] = { name: r.name, morning: r.morning, evening: r.evening }; }); }
            else { savedRoutines = JSON.parse(JSON.stringify(DEFAULT_ROUTINES)); for (const [id, r] of Object.entries(savedRoutines)) await supabaseClient.from('routines').insert({ id, name: r.name, morning: r.morning, evening: r.evening, user_id: currentUserId }); }
            return true;
        } catch (e) { console.error(e); return false; }
    }

    async function syncToCloud() {
        if (!isAuthenticated) { alert("Please sign in first"); return; }
        try {
            for (const p of productsData) await supabaseClient.from('products').upsert({ ...p, user_id: currentUserId });
            for (const [id, r] of Object.entries(savedRoutines)) await supabaseClient.from('routines').upsert({ id, name: r.name, morning: r.morning, evening: r.evening, user_id: currentUserId });
            alert("Synced to cloud!");
        } catch (e) { alert("Sync failed: " + e.message); }
    }

    function loadRoutine(routineId) {
        let routine = savedRoutines[routineId];
        if (routine) {
            currentRoutineId = routineId;
            morningProducts = routine.morning.map(pid => ({ productId: pid, time: "morning" }));
            eveningProducts = routine.evening.map(pid => ({ productId: pid, time: "evening" }));
            renderRoutines(); updateTotalPrice(); highlightActiveRoutine(); saveToLocalStorage();
            if (isAuthenticated) syncToCloud();
        }
    }

    function highlightActiveRoutine() {
        document.querySelectorAll('.routine-btn').forEach(btn => {
            if (btn.dataset.id === currentRoutineId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function saveCurrentAsStandardRoutine() {
        let name = prompt("Enter a name for this new Standard Routine:", "My Custom Routine");
        if (!name || name.trim() === "") return;
        let newId = "standard-" + Date.now();
        savedRoutines[newId] = { name: name.trim(), morning: morningProducts.map(p => p.productId), evening: eveningProducts.map(p => p.productId) };
        saveToLocalStorage(); renderRoutineButtons(); loadRoutine(newId);
        if (isAuthenticated) syncToCloud();
        alert('"' + name + '" has been saved!');
    }

    function updateCurrentRoutine() { savedRoutines[currentRoutineId] = { name: savedRoutines[currentRoutineId].name, morning: morningProducts.map(p => p.productId), evening: eveningProducts.map(p => p.productId) }; saveToLocalStorage(); if (isAuthenticated) syncToCloud(); }
    function renameCurrentRoutine(newName) { if (savedRoutines[currentRoutineId]) { savedRoutines[currentRoutineId].name = newName; renderRoutineButtons(); highlightActiveRoutine(); saveToLocalStorage(); if (isAuthenticated) syncToCloud(); } }
    function deleteCurrentRoutine() { 
        if (currentRoutineId === "fnl-acne" || currentRoutineId === "sm-acne-pigment" || currentRoutineId === "fnl-pigmentation") { alert("Cannot delete preset routines"); return; }
        if (confirm('Delete "' + savedRoutines[currentRoutineId]?.name + '"?')) { delete savedRoutines[currentRoutineId]; let firstKey = Object.keys(savedRoutines)[0]; loadRoutine(firstKey); renderRoutineButtons(); saveToLocalStorage(); if (isAuthenticated) syncToCloud(); } }
    function renderRoutineButtons() {
        let container = document.getElementById('routineButtons');
        if (!container) return;
        container.innerHTML = Object.entries(savedRoutines).map(([id, r]) => `<button class="routine-btn ${id === currentRoutineId ? 'active' : ''}" data-id="${id}">${escapeHtml(r.name)}</button>`).join('');
        document.querySelectorAll('.routine-btn').forEach(btn => { btn.onclick = () => loadRoutine(btn.dataset.id); });
    }
    function getUniqueProductsTotal() { let ids = new Set(); morningProducts.forEach(i => ids.add(i.productId)); eveningProducts.forEach(i => ids.add(i.productId)); let total = 0; ids.forEach(id => { let p = getProductById(id); if(p) total += p.price; }); return total; }
    function updateTotalPrice() { let span = document.getElementById('totalPrice'); if (span) span.innerText = getUniqueProductsTotal().toFixed(2); }

    // 渲染函数
    function renderBrandProducts() {
        let container = document.getElementById('brandProductsContainer');
        if (!container) return;
        let filtered = currentBrand === "all" ? productsData : productsData.filter(p => p.brand === currentBrand);
        container.innerHTML = filtered.map(p => `<div class="library-item" draggable="true" data-product-id="${p.id}" data-product-name="${escapeHtml(p.name)}" data-product-price="${p.price}" data-product-benefit="${escapeHtml(p.benefit || '')}" data-product-usage="${escapeHtml(p.usage || '')}" data-product-image="${p.image || ''}">${escapeHtml(p.name)} <span class="library-price">$${p.price}</span><span class="edit-icon" data-id="${p.id}" title="Edit">✎</span></div>`).join('');
        attachDragEvents(); attachEditEvents();
    }
    function attachDragEvents() { document.querySelectorAll('.library-item').forEach(el => { el.setAttribute('draggable', 'true'); el.addEventListener('dragstart', (e) => { let data = { id: el.dataset.productId, name: el.dataset.productName, price: parseFloat(el.dataset.productPrice), benefit: el.dataset.productBenefit, usage: el.dataset.productUsage, image: el.dataset.productImage }; e.dataTransfer.setData('text/plain', JSON.stringify(data)); }); }); }
    function attachEditEvents() { document.querySelectorAll('.edit-icon').forEach(icon => { icon.onclick = (e) => { e.stopPropagation(); let product = getProductById(icon.dataset.id); if (product) openEditForm(product); }; }); }
    function openEditForm(product) { document.getElementById('productName').value = product.name; document.getElementById('productBrand').value = product.brand; document.getElementById('productPrice').value = product.price; document.getElementById('productBenefit').value = product.benefit || ''; document.getElementById('productUsage').value = product.usage || ''; document.getElementById('productImage').value = product.image || ''; document.getElementById('editProductId').value = product.id; document.getElementById('productForm').classList.add('show'); document.getElementById('toggleAddBtn').style.display = 'none'; }
    function saveProduct() { let name = document.getElementById('productName').value.trim(); if (!name) { alert("Enter product name"); return; } let newProduct = { id: document.getElementById('editProductId').value || generateId(), name: name, brand: document.getElementById('productBrand').value, price: parseFloat(document.getElementById('productPrice').value) || 0, benefit: document.getElementById('productBenefit').value, usage: document.getElementById('productUsage').value, image: document.getElementById('productImage').value }; let existing = productsData.findIndex(p => p.id === newProduct.id); if (existing >= 0) productsData[existing] = newProduct; else productsData.push(newProduct); closeForm(); renderBrandProducts(); renderRoutines(); updateTotalPrice(); saveToLocalStorage(); if (isAuthenticated) syncToCloud(); }
    function closeForm() { document.getElementById('productForm').classList.remove('show'); document.getElementById('toggleAddBtn').style.display = ''; document.getElementById('productName').value = ''; document.getElementById('editProductId').value = ''; }
    function renderRoutines() { let morningContainer = document.getElementById('morningList'), eveningContainer = document.getElementById('eveningList'); if (morningContainer) morningContainer.innerHTML = morningProducts.map((item, idx) => renderCard(item.productId, idx, 'morning')).join(''); if (eveningContainer) eveningContainer.innerHTML = eveningProducts.map((item, idx) => renderCard(item.productId, idx, 'evening')).join(''); attachDropEvents('morningList', 'morning'); attachDropEvents('eveningList', 'evening'); attachDeleteEvents(); }
    function renderCard(pid, idx, time) { let p = getProductById(pid); if (!p) return ''; return `<div class="product-card" data-product-id="${p.id}" data-index="${idx}" data-time="${time}" draggable="true"><button class="delete-btn" data-time="${time}" data-index="${idx}">✕</button><div class="product-image"><img src="${p.image || 'https://via.placeholder.com/52/f1e8e0/8f7e6b?text=Product'}" alt="${escapeHtml(p.name)}"></div><div class="product-info"><div class="product-name">${escapeHtml(p.name)} <span class="product-price">$${p.price}</span></div><div class="benefit">${escapeHtml(p.benefit || '')}</div><div class="usage"><i class="icon-hand"></i> ${escapeHtml((p.usage || '').substring(0, 55))}</div></div></div>`; }
    function attachDropEvents(containerId, time) { let container = document.getElementById(containerId); if (!container) return; container.ondragover = (e) => e.preventDefault(); container.ondrop = (e) => { e.preventDefault(); let targetCard = e.target.closest('.product-card'); if (!targetCard) return; let targetIdx = parseInt(targetCard.dataset.index); let dragData = JSON.parse(e.dataTransfer.getData('text/plain')); if (dragData && dragData.id) { if (time === 'morning' && morningProducts[targetIdx]) morningProducts[targetIdx] = { productId: dragData.id, time: 'morning' }; if (time === 'evening' && eveningProducts[targetIdx]) eveningProducts[targetIdx] = { productId: dragData.id, time: 'evening' }; updateCurrentRoutine(); renderRoutines(); updateTotalPrice(); saveToLocalStorage(); if (isAuthenticated) syncToCloud(); } }; }
    function attachDeleteEvents() { document.querySelectorAll('.delete-btn').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); let time = btn.dataset.time, idx = parseInt(btn.dataset.index); if (time === 'morning') morningProducts.splice(idx, 1); else eveningProducts.splice(idx, 1); updateCurrentRoutine(); renderRoutines(); updateTotalPrice(); saveToLocalStorage(); if (isAuthenticated) syncToCloud(); }; }); }
    function printRoutine() { let uniqueMorning = morningProducts.filter((item, idx, self) => self.findIndex(i => i.productId === item.productId) === idx); let uniqueEvening = eveningProducts.filter((item, idx, self) => self.findIndex(i => i.productId === item.productId) === idx); let win = window.open('', '_blank'); win.document.write(`<!DOCTYPE html><html><head><title>Skincare Routine</title><style>body{font-family:'Inter',sans-serif;padding:0.5in;} .print-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;} .print-column{border:1px solid #ddd;border-radius:16px;padding:20px;} .print-product{display:flex;gap:12px;margin-bottom:15px;} img{width:48px;height:48px;border-radius:50%;object-fit:cover;}</style></head><body><h2 style="text-align:center">${escapeHtml(savedRoutines[currentRoutineId]?.name || 'Skincare Routine')}</h2><div class="print-grid"><div class="print-column"><h3>MORNING ☀️</h3>${uniqueMorning.map(i => { let p=getProductById(i.productId); return p?`<div class="print-product"><img src="${p.image||''}"><div><b>${escapeHtml(p.name)}</b><br><small>${escapeHtml(p.benefit||'')}</small></div></div>`:''; }).join('')}</div><div class="print-column"><h3>EVENING 🌙</h3>${uniqueEvening.map(i => { let p=getProductById(i.productId); return p?`<div class="print-product"><img src="${p.image||''}"><div><b>${escapeHtml(p.name)}</b><br><small>${escapeHtml(p.benefit||'')}</small></div></div>`:''; }).join('')}</div></div></body></html>`); win.document.close(); win.print(); }
    function renderBrandTabs() { let brands = ["all", "SkinMedica", "Skinceuticals", "FNL", "ColorScience", "Others"]; let container = document.getElementById('brandTabs'); if (!container) return; container.innerHTML = brands.map(b => `<button class="brand-tab ${b === currentBrand ? 'active' : ''}" data-brand="${b}">${b === 'all' ? 'All' : b}</button>`).join(''); document.querySelectorAll('.brand-tab').forEach(tab => { tab.onclick = () => { currentBrand = tab.dataset.brand; renderBrandTabs(); renderBrandProducts(); }; }); }

    // 认证函数 - 简化版，避免循环
    async function handleLogin() {
        const { error } = await supabaseClient.auth.signInWithOAuth({ 
            provider: 'google', 
            options: { redirectTo: window.location.href }
        });
        if (error) alert('Login error: ' + error.message);
    }

    async function handleLogout() { 
        await supabaseClient.auth.signOut(); 
        // 清除本地存储但保留默认数据
        localStorage.clear();
        location.reload();
    }

    // 一次性加载，不监听变化
    async function initAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            isAuthenticated = true;
            currentUserId = session.user.id;
            document.getElementById('authStatus').innerHTML = `✅ Signed in as ${session.user.email}`;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            await loadFromCloud();
        } else {
            isAuthenticated = false;
            document.getElementById('authStatus').innerHTML = `🔓 Sign in with Google to sync across devices`;
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            loadFromLocalStorage();
        }
        
        // 无论登录与否，都渲染页面
        renderBrandTabs(); 
        renderBrandProducts(); 
        renderRoutineButtons(); 
        loadRoutine(currentRoutineId);
    }

    // 绑定按钮事件
    document.getElementById('toggleAddBtn').onclick = () => { document.getElementById('editProductId').value = ''; closeForm(); document.getElementById('productForm').classList.add('show'); document.getElementById('toggleAddBtn').style.display = 'none'; };
    document.getElementById('cancelFormBtn').onclick = closeForm;
    document.getElementById('saveProductBtn').onclick = saveProduct;
    document.getElementById('printBtn').onclick = printRoutine;
    document.getElementById('saveStandardBtn').onclick = saveCurrentAsStandardRoutine;
    document.getElementById('editRoutineBtn').onclick = () => { let newName = prompt("Edit routine name:", savedRoutines[currentRoutineId]?.name); if(newName) renameCurrentRoutine(newName); };
    document.getElementById('deleteRoutineBtn').onclick = deleteCurrentRoutine;
    document.getElementById('syncBtn').onclick = syncToCloud;
    document.getElementById('loginBtn').onclick = handleLogin;
    document.getElementById('logoutBtn').onclick = handleLogout;

    // 启动应用
    initAuth();
}

// 等待页面加载完成后启动
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
} else {
    initApp();
}
</script>
