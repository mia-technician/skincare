<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Laser Tattoo Removal | Compact Intake & Note</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px 16px;
            color: #1e2f3a;
        }

        /* more compact container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(105deg, #1a3f4f 0%, #1f5a6b 100%);
            padding: 18px 28px;
            color: white;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1::before {
            content: "⚡";
            font-size: 1.7rem;
        }

        .header p {
            margin-top: 6px;
            opacity: 0.85;
            font-size: 0.8rem;
        }

        .questions-area {
            padding: 20px 24px 16px 24px;
            background: #ffffff;
        }

        /* compact sections */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1c5a6e;
            margin: 0.8rem 0 0.5rem 0;
            padding-bottom: 4px;
            border-bottom: 2px solid #cbe4ed;
            display: inline-block;
        }

        .subsection-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2b6c7e;
            margin: 0.8rem 0 0.4rem 0;
            background: #eef6f9;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        .question-card {
            background: #ffffff;
            border-radius: 18px;
            margin-bottom: 14px;
            padding: 12px 18px;
            border: 1px solid #e2ecf0;
            transition: 0.1s;
        }

        .question-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #164454;
            margin-bottom: 8px;
            line-height: 1.35;
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }

        .q-num {
            background: #e2f0f5;
            color: #1c6d82;
            border-radius: 30px;
            padding: 0px 10px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            border-radius: 16px;
            border: 1px solid #d0dfe6;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-family: inherit;
            background: #fefefe;
            resize: vertical;
            transition: 0.15s;
            color: #1f3e4c;
        }

        textarea:focus {
            outline: none;
            border-color: #2f8b9e;
            box-shadow: 0 0 0 2px rgba(47, 139, 158, 0.1);
        }

        .helper-note {
            margin-top: 4px;
            font-size: 0.65rem;
            color: #7c9aa8;
            text-align: right;
        }

        .action-bar {
            padding: 12px 24px 28px 24px;
            background: #ffffff;
            border-top: 1px solid #e2ecf0;
            display: flex;
            justify-content: center;
        }

        .print-btn {
            background: #1c6d5e;
            border: none;
            padding: 10px 32px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
        }

        .print-btn:hover {
            background: #0f5548;
            transform: translateY(-1px);
        }

        footer {
            background: #f6fafc;
            padding: 10px 24px;
            text-align: center;
            font-size: 0.65rem;
            color: #6e8b9b;
            border-top: 1px solid #e0ecf2;
        }

        .hidden-export {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 900px;
            background: white;
            padding: 30px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            z-index: -1;
        }

        @media (max-width: 650px) {
            .questions-area {
                padding: 16px;
            }
            .question-card {
                padding: 10px 14px;
            }
            .header {
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Laser Tattoo Removal · Clinical Intake</h1>
        <p>Structured consultation | Compact form | Pre-filled examples for quick edit</p>
    </div>

    <div class="questions-area" id="questionsArea">
        <!-- dynamic fields with pre-filled placeholder content (simple text) -->
    </div>

    <div class="action-bar">
        <button class="print-btn" id="exportNoteBtn">📋 Generate Clinic Note (Copy/Export)</button>
    </div>
    <footer>Pre-filled demo data — edit as needed → click to generate professional note → copy/paste into EMR.</footer>
</div>
<div id="exportTextContainer" class="hidden-export"></div>

<script>
    // --------------------------------------------------------------
    // COMPACT CLINICAL QUESTIONNAIRE with PRE-FILLED (simple placeholder content)
    // Each answer area will be preloaded with concise demo text to save time.
    // --------------------------------------------------------------
    const QUESTIONS = [
        { id: "tattoo_location", text: "Unwanted Tattoos & Location", placeholder: "e.g., Tattoo A: Canada flag L-forearm; Tattoo B: micro-bladed brows", prefill: "Tattoo A on L-forearm (Canada flag), Tattoo B: micro-bladed brows" },
        { id: "tattooA_desc", text: "Tattoo A details: colour, professional/amateur? circumferential?", placeholder: "red/black, amateur, not circumferential", prefill: "Red & black, amateur ink, not circumferential" },
        { id: "brows_desc", text: "Brows: black micro-bladed cosmetic ink?", placeholder: "Confirm micro-bladed brows", prefill: "Yes, black micro-bladed cosmetic ink" },
        { id: "age_tattoo", text: "Tattoo age (>3 months old?)", placeholder: "e.g., done in 2020", prefill: "Done in 2020, >3 months old" },
        { id: "prior_tx", text: "Prior laser sessions (3 pico-sure, last 3y ago, faded)", placeholder: "3 sessions, last 3y ago, residual fading", prefill: "3 pico-sure TX, last TX 3 years ago, faded a bit" },
        { id: "patient_goal", text: "Patient's goal (full/partial removal/fade for cover-up?)", placeholder: "Fade for cover-up", prefill: "Fade tattoo & brows for cover-up" },
        { id: "medications", text: "Photosensitizing medications? (none confirmed)", placeholder: "No light-sensitive meds", prefill: "No light-sensitive medications" },
        // PHYSICAL
        { id: "rough_texture", text: "Physical: rough texture / microneedling?", placeholder: "some roughness noted", prefill: "Rough texture in ink, possible microneedling future" },
        { id: "raised_ink", text: "Ink raised (laser won't flatten) – explained", placeholder: "raised, advised", prefill: "Ink raised, patient informed laser won't flatten" },
        { id: "no_tan", text: "No tanning last 4 weeks?", placeholder: "confirm no UV", prefill: "No tanning for 4 weeks" },
        { id: "moles_eczema", text: "Moles/eczema/herpes in area? (area avoided)", placeholder: "none / moles noted but avoided", prefill: "No active lesions, area clear" },
        // EXPLANATIONS
        { id: "tx_number", text: "# treatments: unpredictable, 8-12w intervals", placeholder: "explained intervals", prefill: "Cannot predict #TX, 8-12 weeks between sessions" },
        { id: "artist_followup", text: "Artist follow-up needed (to assess readiness)", placeholder: "patient aware", prefill: "Will follow up with tattoo artist" },
        { id: "clean_edge", text: "Cannot guarantee clean edge – explained", placeholder: "acknowledged", prefill: "Patient understands no guarantee of clean edge" },
        { id: "blisters", text: "Blisters: do NOT pop; drain if needed", placeholder: "education given", prefill: "Instructed not to pop blisters; clinic can drain if large" },
        { id: "ink_oxidizing", text: "Ink oxidizing possibility explained", placeholder: "explained color changes", prefill: "Oxidation risk explained" },
        { id: "pre_post_care", text: "Pre/post care + TNS Recovery (post-polysporin)", placeholder: "aftercare + TNS", prefill: "Aftercare given, TNS Recovery recommended 7-10d post TX" },
        { id: "tx_procedure", text: "Procedure: ice, cold air, numbing, nitrous (extra charge)", placeholder: "steps explained", prefill: "Pre-ice, cold air, vibrating device, topical numbing, nitrous available" },
        // SETTINGS & APPROVALS
        { id: "settings_microblade", text: "Micro-blade brow: Enlighten 1064, 8mm, 0.5-1j, ps, 1-3hz (1.1j need approval)", placeholder: "brow settings", prefill: "Enlighten 1064, 8mm, 0.8j, ps, 2hz (1.1j if needed → approval)" },
        { id: "settings_black", text: "Black/Grey/Dark Blue: Enlighten 1064 1-1.1j OR Pico 755", placeholder: "e.g., Enlighten 1j, 6hz", prefill: "Enlighten 1064, 1j, 8mm, ps, 6hz" },
        { id: "settings_green", text: "Green/Light Blue: Pico 755, 6-5mm", placeholder: "Pico 755 settings", prefill: "Pico 755, 6mm" },
        { id: "dr_shah_red", text: "Red/Pink/Orange requires Dr.Shah approval (Enlighten 532 <0.5j)", placeholder: "pending/approved", prefill: "Awaiting Dr. Shah approval" },
        { id: "other_colors", text: "Other ink colours (Dr.Shah approval)", placeholder: "specify colours", prefill: "No unusual colours" },
        { id: "skin_type", text: "Skin Type 5 & 6 (Dr.Shah approval required)", placeholder: "Fitzpatrick type", prefill: "Skin Type III, no approval needed" }
    ];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Render all questions with pre-filled values (simple default content)
    function renderQuestionsWithPrefill() {
        const container = document.getElementById('questionsArea');
        if (!container) return;

        // define groups using IDs
        const infoIds = ["tattoo_location", "tattooA_desc", "brows_desc", "age_tattoo", "prior_tx", "patient_goal", "medications"];
        const physicalIds = ["rough_texture", "raised_ink", "no_tan", "moles_eczema"];
        const explainedIds = ["tx_number", "artist_followup", "clean_edge", "blisters", "ink_oxidizing", "pre_post_care", "tx_procedure"];
        const settingsIds = ["settings_microblade", "settings_black", "settings_green", "dr_shah_red", "other_colors", "skin_type"];

        function buildGroup(ids, groupLabel = null) {
            let html = '';
            if (groupLabel) {
                html += `<div class="subsection-title">${escapeHtml(groupLabel)}</div>`;
            }
            ids.forEach(id => {
                const q = QUESTIONS.find(qq => qq.id === id);
                if (q) {
                    // Prefill value: simple text ready to be edited
                    const prefillValue = q.prefill || '';
                    html += `
                        <div class="question-card">
                            <div class="question-text">
                                <span class="q-num">⦿</span>
                                <span>${escapeHtml(q.text)}</span>
                            </div>
                            <div class="answer-wrapper">
                                <textarea id="${q.id}" rows="2" placeholder="${escapeHtml(q.placeholder)}">${escapeHtml(prefillValue)}</textarea>
                                <div class="helper-note">✏️ edit as needed</div>
                            </div>
                        </div>
                    `;
                }
            });
            return html;
        }

        let fullHtml = `<div class="section-title">📋 INFORMATION GATHERING</div>`;
        fullHtml += buildGroup(infoIds, "Tattoo & Patient Background");
        fullHtml += `<div class="section-title">🩺 PHYSICAL CHECK</div>`;
        fullHtml += buildGroup(physicalIds, "Examination Findings");
        fullHtml += `<div class="section-title">📸 CONSENT & EXPLANATIONS</div>`;
        fullHtml += buildGroup(explainedIds, "Informed discussion");
        fullHtml += `<div class="section-title">⚙️ LASER SETTINGS & APPROVALS</div>`;
        fullHtml += buildGroup(settingsIds, "First TX parameters / Dr.Shah approvals");

        container.innerHTML = fullHtml;
    }

    // Collect all answers as array
    function getAllAnswers() {
        const results = [];
        for (let q of QUESTIONS) {
            const textarea = document.getElementById(q.id);
            let answer = textarea ? textarea.value.trim() : '';
            if (answer === '') answer = '[Not documented]';
            results.push({
                id: q.id,
                question: q.text,
                answer: answer
            });
        }
        return results;
    }

    // Generate the final Clinical Note (professional & includes all Q&A)
    function generateClinicNote() {
        const answers = getAllAnswers();
        const now = new Date();
        const dateTime = `${now.toLocaleDateString('en-US')} ${now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'})}`;
        
        const getAns = (id) => {
            const found = answers.find(a => a.id === id);
            return found ? found.answer : '[N/A]';
        };

        const tattooLoc = getAns("tattoo_location");
        const goal = getAns("patient_goal");
        const priorTx = getAns("prior_tx");
        const raisedInfo = getAns("raised_ink");
        const settingsBrow = getAns("settings_microblade");
        const settingsBlack = getAns("settings_black");
        const greenSet = getAns("settings_green");
        const drShahRed = getAns("dr_shah_red");
        const skinType = getAns("skin_type");
        const txProcedure = getAns("tx_procedure");
        const aftercare = getAns("pre_post_care");
        const roughTex = getAns("rough_texture");
        const molesEczema = getAns("moles_eczema");
        const blistersExpl = getAns("blisters");
        const oxidizing = getAns("ink_oxidizing");
        const cleanEdge = getAns("clean_edge");
        const artistFollow = getAns("artist_followup");
        const txNumExplain = getAns("tx_number");

        let note = `==================================================\n`;
        note += `        LASER TATTOO REMOVAL CLINICAL NOTE\n`;
        note += `==================================================\n`;
        note += `Date: ${dateTime}\n`;
        note += `Provider: Laser Clinic / Medical Record\n`;
        note += `--------------------------------------------------\n\n`;
        
        note += `🔹 SUBJECTIVE & HISTORY\n`;
        note += `• Unwanted tattoos & location: ${tattooLoc}\n`;
        note += `• Tattoo A specifics: ${getAns("tattooA_desc")}\n`;
        note += `• Brows (micro-bladed): ${getAns("brows_desc")}\n`;
        note += `• Tattoo age: ${getAns("age_tattoo")}\n`;
        note += `• Prior laser sessions: ${priorTx}\n`;
        note += `• Patient goal: ${goal}\n`;
        note += `• Photosensitizing meds: ${getAns("medications")}\n\n`;
        
        note += `🔹 PHYSICAL EXAMINATION\n`;
        note += `• Ink texture / microneedling: ${roughTex}\n`;
        note += `• Raised ink (laser won't flatten): ${raisedInfo}\n`;
        note += `• No tanning (4 weeks): ${getAns("no_tan")}\n`;
        note += `• Moles/eczema/herpes: ${molesEczema}\n\n`;
        
        note += `🔹 INFORMED CONSENT & EXPLANATIONS\n`;
        note += `• # treatments unpredictable (8-12w): ${txNumExplain}\n`;
        note += `• Artist follow-up: ${artistFollow}\n`;
        note += `• Clean edge not guaranteed: ${cleanEdge}\n`;
        note += `• Blister management: ${blistersExpl}\n`;
        note += `• Ink oxidation risk: ${oxidizing}\n`;
        note += `• Pre/post care + TNS Recovery: ${aftercare}\n`;
        note += `• Procedure (ice, numbing, nitrous): ${txProcedure}\n\n`;
        
        note += `🔹 LASER SETTINGS & DR. SHAH APPROVAL STATUS\n`;
        note += `• Micro-blade brow: ${settingsBrow}\n`;
        note += `• Black/Grey/Dark Blue: ${settingsBlack}\n`;
        note += `• Green/Light Blue: ${greenSet}\n`;
        note += `• Red/Pink/Orange (Dr.Shah req): ${drShahRed}\n`;
        note += `• Other colours approval: ${getAns("other_colors")}\n`;
        note += `• Skin Type 5&6 approval: ${skinType}\n\n`;
        
        note += `🔹 PLAN / RECOMMENDATIONS\n`;
        note += `- First treatment per settings (pending approvals if applicable).\n`;
        note += `- Follow-up 8-12 weeks; strict sun protection; TNS Recovery as per protocol.\n`;
        note += `- Coordinate with cover-up artist for readiness.\n`;
        note += `- If blistering/oxidation → clinic follow-up arranged.\n`;
        note += `- Signed consent & photography on file.\n`;
        note += `--------------------------------------------------\n`;
        note += `Note generated from intake form | all answers included below.\n`;
        note += `==================================================\n\n`;
        
        note += `[ COMPLETE CLINICAL Q&A TRANSCRIPT ]\n`;
        note += `--------------------------------------------------\n`;
        answers.forEach((item, idx) => {
            note += `${idx+1}. ${item.question}\n   → ${item.answer}\n\n`;
        });
        note += `End of record — for professional use only.`;
        return note;
    }

    // Modal for displaying & copying note
    function showExportModal(noteText) {
        const modalDiv = document.createElement('div');
        modalDiv.style.position = 'fixed';
        modalDiv.style.top = '0';
        modalDiv.style.left = '0';
        modalDiv.style.width = '100%';
        modalDiv.style.height = '100%';
        modalDiv.style.backgroundColor = 'rgba(0,0,0,0.6)';
        modalDiv.style.display = 'flex';
        modalDiv.style.alignItems = 'center';
        modalDiv.style.justifyContent = 'center';
        modalDiv.style.zIndex = '10000';
        modalDiv.style.backdropFilter = 'blur(2px)';
        
        const modalInner = document.createElement('div');
        modalInner.style.background = '#fff';
        modalInner.style.borderRadius = '28px';
        modalInner.style.width = '92%';
        modalInner.style.maxWidth = '900px';
        modalInner.style.maxHeight = '85%';
        modalInner.style.display = 'flex';
        modalInner.style.flexDirection = 'column';
        modalInner.style.boxShadow = '0 20px 35px rgba(0,0,0,0.25)';
        modalInner.style.overflow = 'hidden';
        
        const modalHeader = document.createElement('div');
        modalHeader.style.padding = '14px 24px 10px';
        modalHeader.style.borderBottom = '1px solid #e2edf2';
        modalHeader.style.display = 'flex';
        modalHeader.style.justifyContent = 'space-between';
        modalHeader.style.alignItems = 'center';
        modalHeader.style.background = '#fafeff';
        modalHeader.innerHTML = `<h3 style="margin:0; font-weight:700; font-size:1.2rem; color:#1d6f6a;">📄 Clinical Note ready to copy</h3>
                                  <button id="closeModalBtn" style="background:none; border:none; font-size:26px; cursor:pointer; line-height:1;">&times;</button>`;
        
        const textContainer = document.createElement('div');
        textContainer.style.flex = '1';
        textContainer.style.overflow = 'auto';
        textContainer.style.padding = '16px 24px';
        textContainer.style.backgroundColor = '#fefcf5';
        
        const preElem = document.createElement('pre');
        preElem.style.whiteSpace = 'pre-wrap';
        preElem.style.wordBreak = 'break-word';
        preElem.style.fontFamily = 'Consolas, "Courier New", monospace';
        preElem.style.fontSize = '12.5px';
        preElem.style.lineHeight = '1.45';
        preElem.style.margin = '0';
        preElem.style.background = '#faf7ed';
        preElem.style.padding = '14px';
        preElem.style.borderRadius = '20px';
        preElem.style.border = '1px solid #e5dec8';
        preElem.textContent = noteText;
        textContainer.appendChild(preElem);
        
        const modalFooter = document.createElement('div');
        modalFooter.style.padding = '12px 24px 20px';
        modalFooter.style.borderTop = '1px solid #e2ecf0';
        modalFooter.style.display = 'flex';
        modalFooter.style.gap = '12px';
        modalFooter.style.justifyContent = 'flex-end';
        
        const copyBtn = document.createElement('button');
        copyBtn.innerText = '📋 Copy Full Note';
        copyBtn.style.background = '#1c6d5e';
        copyBtn.style.color = 'white';
        copyBtn.style.border = 'none';
        copyBtn.style.padding = '8px 24px';
        copyBtn.style.borderRadius = '40px';
        copyBtn.style.fontWeight = 'bold';
        copyBtn.style.cursor = 'pointer';
        copyBtn.style.fontSize = '0.85rem';
        
        const closeBtn = document.createElement('button');
        closeBtn.innerText = 'Close';
        closeBtn.style.background = '#e2e8f0';
        closeBtn.style.border = 'none';
        closeBtn.style.padding = '8px 22px';
        closeBtn.style.borderRadius = '40px';
        closeBtn.style.cursor = 'pointer';
        closeBtn.style.fontSize = '0.85rem';
        
        modalFooter.appendChild(copyBtn);
        modalFooter.appendChild(closeBtn);
        modalInner.appendChild(modalHeader);
        modalInner.appendChild(textContainer);
        modalInner.appendChild(modalFooter);
        modalDiv.appendChild(modalInner);
        document.body.appendChild(modalDiv);
        
        const closeModal = () => { if (document.body.contains(modalDiv)) modalDiv.remove(); };
        closeBtn.addEventListener('click', closeModal);
        modalHeader.querySelector('#closeModalBtn').addEventListener('click', closeModal);
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) closeModal(); });
        
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(noteText);
                copyBtn.innerText = '✅ Copied!';
                setTimeout(() => { copyBtn.innerText = '📋 Copy Full Note'; }, 1700);
            } catch (err) {
                const temp = document.createElement('textarea');
                temp.value = noteText;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                copyBtn.innerText = '✅ Copied (fallback)';
                setTimeout(() => { copyBtn.innerText = '📋 Copy Full Note'; }, 1500);
            }
        });
    }
    
    function handleExport() {
        const fullNote = generateClinicNote();
        const hiddenDiv = document.getElementById('exportTextContainer');
        if (hiddenDiv) hiddenDiv.innerText = fullNote;
        showExportModal(fullNote);
    }
    
    function init() {
        renderQuestionsWithPrefill();   // pre-filled compact version
        const exportBtn = document.getElementById('exportNoteBtn');
        if (exportBtn) exportBtn.addEventListener('click', handleExport);
    }
    
    init();
</script>
</body>
</html>
